<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
<rect width="1600" height="900" fill="#F7F8FA"/>
<style>.font{font-family:"Microsoft JhengHei","Noto Sans TC",Arial,sans-serif}.ink{fill:#172033}.muted{fill:#5B6475}.accent{fill:#2F6F73}.warm{fill:#C56A2C}</style>
<text x="84" y="82" class="font accent" font-size="24" font-weight="700">第 5 頁</text>
<text x="84" y="152" class="font ink" font-size="44" font-weight="700">線上社群理論輔證</text>
<line x1="84" y1="247" x2="1518" y2="247" stroke="#D8DEE8" stroke-width="2"/>
<text x="88" y="305" class="font muted" font-size="27">文獻：“User Lifecycle and Linguistic Change in Online Communities”</text>
    <rect x="86" y="350" width="1360" height="340" fill="#fff" stroke="#D8DEE8" stroke-width="2"/><rect x="86" y="350" width="1360" height="52" fill="#EDF2F7" stroke="#D8DEE8"/><text x="110" y="384" class="font muted" font-size="19" font-weight="700">本文階段</text><line x1="276" y1="350" x2="276" y2="690" stroke="#D8DEE8"/><text x="300" y="384" class="font muted" font-size="19" font-weight="700">論文概念</text><line x1="776" y1="350" x2="776" y2="690" stroke="#D8DEE8"/><text x="800" y="384" class="font muted" font-size="19" font-weight="700">解釋</text><rect x="86" y="402" width="1360" height="72" fill="#fff" stroke="#D8DEE8"/><text x="110" y="446" class="font ink" font-size="24" font-weight="700">上升期</text><line x1="276" y1="350" x2="276" y2="690" stroke="#D8DEE8"/><text x="300" y="446" class="font ink" font-size="24" font-weight="400">Linguistic innovation</text><line x1="776" y1="350" x2="776" y2="690" stroke="#D8DEE8"/><text x="800" y="446" class="font ink" font-size="24" font-weight="400">小群體先帶入新用法</text><rect x="86" y="474" width="1360" height="72" fill="#fff" stroke="#D8DEE8"/><text x="110" y="518" class="font ink" font-size="24" font-weight="700">成熟期</text><line x1="276" y1="350" x2="276" y2="690" stroke="#D8DEE8"/><text x="300" y="518" class="font ink" font-size="24" font-weight="400">Community norm / Conforming</text><line x1="776" y1="350" x2="776" y2="690" stroke="#D8DEE8"/><text x="800" y="518" class="font ink" font-size="24" font-weight="400">成員跟著用，變成社群規範</text><rect x="86" y="546" width="1360" height="72" fill="#fff" stroke="#D8DEE8"/><text x="110" y="590" class="font ink" font-size="24" font-weight="700">衰退期</text><line x1="276" y1="350" x2="276" y2="690" stroke="#D8DEE8"/><text x="300" y="590" class="font ink" font-size="24" font-weight="400">Linguistic adolescence 後的距離</text><line x1="776" y1="350" x2="776" y2="690" stroke="#D8DEE8"/><text x="800" y="590" class="font ink" font-size="24" font-weight="400">社群語言繼續變，舊詞停住</text><rect x="86" y="618" width="1360" height="72" fill="#fff" stroke="#D8DEE8"/><text x="110" y="662" class="font ink" font-size="24" font-weight="700">死語期</text><line x1="276" y1="350" x2="276" y2="690" stroke="#D8DEE8"/><text x="300" y="662" class="font ink" font-size="24" font-weight="400">Conservative phase</text><line x1="776" y1="350" x2="776" y2="690" stroke="#D8DEE8"/><text x="800" y="662" class="font ink" font-size="24" font-weight="400">舊使用者保存，新使用者不自然採用</text>
    <text x="92" y="765" class="font warm" font-size="24" font-weight="700">關鍵句</text>
    <text x="92" y="815" class="font ink" font-size="32" font-weight="700">線上社群的語言會隨使用者加入、離開與互動而改變。</text>
</svg>