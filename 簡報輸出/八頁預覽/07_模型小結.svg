<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
<rect width="1600" height="900" fill="#F7F8FA"/>
<style>.font{font-family:"Microsoft JhengHei","Noto Sans TC",Arial,sans-serif}.ink{fill:#172033}.muted{fill:#5B6475}.accent{fill:#2F6F73}.warm{fill:#C56A2C}</style>
<text x="84" y="82" class="font accent" font-size="24" font-weight="700">第 7 頁</text>
<text x="84" y="152" class="font ink" font-size="44" font-weight="700">模型小結</text>
<line x1="84" y1="247" x2="1518" y2="247" stroke="#D8DEE8" stroke-width="2"/>
<text x="88" y="310" class="font warm" font-size="24" font-weight="700">來源-語境-二創-退燒模型</text>
    <rect x="86" y="350" width="680" height="308" fill="#fff" stroke="#D8DEE8" stroke-width="2"/><rect x="86" y="350" width="680" height="52" fill="#EDF2F7" stroke="#D8DEE8"/><text x="110" y="384" class="font muted" font-size="20" font-weight="700">階段</text><line x1="266" y1="350" x2="266" y2="658" stroke="#D8DEE8"/><text x="290" y="384" class="font muted" font-size="20" font-weight="700">關鍵問題</text><rect x="86" y="402" width="680" height="64" fill="#fff" stroke="#D8DEE8"/><text x="110" y="446" class="font ink" font-size="25" font-weight="700">來源</text><line x1="266" y1="350" x2="266" y2="658" stroke="#D8DEE8"/><text x="290" y="446" class="font ink" font-size="25" font-weight="400">它從哪裡來？</text><rect x="86" y="466" width="680" height="64" fill="#fff" stroke="#D8DEE8"/><text x="110" y="510" class="font ink" font-size="25" font-weight="700">語境</text><line x1="266" y1="350" x2="266" y2="658" stroke="#D8DEE8"/><text x="290" y="510" class="font ink" font-size="25" font-weight="400">它是否依賴特定事件？</text><rect x="86" y="530" width="680" height="64" fill="#fff" stroke="#D8DEE8"/><text x="110" y="574" class="font ink" font-size="25" font-weight="700">二創</text><line x1="266" y1="350" x2="266" y2="658" stroke="#D8DEE8"/><text x="290" y="574" class="font ink" font-size="25" font-weight="400">它是否能被改寫、模仿、套用？</text><rect x="86" y="594" width="680" height="64" fill="#fff" stroke="#D8DEE8"/><text x="110" y="638" class="font ink" font-size="25" font-weight="700">退燒</text><line x1="266" y1="350" x2="266" y2="658" stroke="#D8DEE8"/><text x="290" y="638" class="font ink" font-size="25" font-weight="400">新使用者是否還自然使用？</text>
    <text x="850" y="310" class="font warm" font-size="24" font-weight="700">本文主張</text>
    <text x="850" y="365" class="font ink" font-size="26">流行語的生命週期可以看成社群規範變化的過程：</text>
    <rect x="840" y="440" width="630" height="208" fill="#fff" stroke="#D8DEE8" stroke-width="2"/><rect x="840" y="440" width="630" height="52" fill="#EDF2F7" stroke="#D8DEE8"/><text x="864" y="474" class="font muted" font-size="18" font-weight="700">狀態</text><line x1="1150" y1="440" x2="1150" y2="648" stroke="#D8DEE8"/><text x="1174" y="474" class="font muted" font-size="18" font-weight="700">意義</text><rect x="840" y="492" width="630" height="78" fill="#fff" stroke="#D8DEE8"/><text x="864" y="536" class="font ink" font-size="23" font-weight="700">被群體吸收</text><line x1="1150" y1="440" x2="1150" y2="648" stroke="#D8DEE8"/><text x="1174" y="536" class="font ink" font-size="23" font-weight="400">進入成熟</text><rect x="840" y="570" width="630" height="78" fill="#fff" stroke="#D8DEE8"/><text x="864" y="614" class="font ink" font-size="23" font-weight="700">不再被新成員自然使用</text><line x1="1150" y1="440" x2="1150" y2="648" stroke="#D8DEE8"/><text x="1174" y="614" class="font ink" font-size="23" font-weight="400">開始死語化</text>
    <text x="800" y="765" text-anchor="middle" class="font accent" font-size="38" font-weight="700">社群往前走了，但某個詞停在原地，它就開始變老。</text>
</svg>