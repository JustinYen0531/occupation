<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
<rect width="1600" height="900" fill="#F7F8FA"/>
<style>.font{font-family:"Microsoft JhengHei","Noto Sans TC",Arial,sans-serif}.ink{fill:#172033}.muted{fill:#5B6475}.accent{fill:#2F6F73}.warm{fill:#C56A2C}</style>
<text x="84" y="82" class="font accent" font-size="24" font-weight="700">第 2 頁</text>
<text x="84" y="152" class="font ink" font-size="44" font-weight="700">來源分類：流行語從哪裡來，會影響它活多久</text>
<line x1="84" y1="247" x2="1518" y2="247" stroke="#D8DEE8" stroke-width="2"/>
<text x="88" y="310" class="font warm" font-size="26" font-weight="700">最重要的兩種來源</text>
    <rect x="86" y="345" width="1360" height="268" fill="#fff" stroke="#D8DEE8" stroke-width="2"/><rect x="86" y="345" width="1360" height="52" fill="#EDF2F7" stroke="#D8DEE8"/><text x="110" y="379" class="font muted" font-size="19" font-weight="700">類型</text><line x1="276" y1="345" x2="276" y2="613" stroke="#D8DEE8"/><text x="300" y="379" class="font muted" font-size="19" font-weight="700">特徵</text><line x1="886" y1="345" x2="886" y2="613" stroke="#D8DEE8"/><text x="910" y="379" class="font muted" font-size="19" font-weight="700">生命週期</text><rect x="86" y="397" width="1360" height="72" fill="#fff" stroke="#D8DEE8"/><text x="110" y="441" class="font ink" font-size="24" font-weight="700">事件型</text><line x1="276" y1="345" x2="276" y2="613" stroke="#D8DEE8"/><text x="300" y="441" class="font ink" font-size="24" font-weight="400">來自新聞、影片名場面、網路事件、人物</text><line x1="886" y1="345" x2="886" y2="613" stroke="#D8DEE8"/><text x="910" y="441" class="font ink" font-size="24" font-weight="400">爆紅快，也退燒快</text><rect x="86" y="469" width="1360" height="72" fill="#fff" stroke="#D8DEE8"/><text x="110" y="513" class="font ink" font-size="24" font-weight="700">情緒表達型</text><line x1="276" y1="345" x2="276" y2="613" stroke="#D8DEE8"/><text x="300" y="513" class="font ink" font-size="24" font-weight="400">表達尷尬、崩潰、嘲諷、無奈、驚訝</text><line x1="886" y1="345" x2="886" y2="613" stroke="#D8DEE8"/><text x="910" y="513" class="font ink" font-size="24" font-weight="400">較容易進入日常使用</text><rect x="86" y="541" width="1360" height="72" fill="#fff" stroke="#D8DEE8"/><text x="110" y="585" class="font ink" font-size="24" font-weight="700">其他來源</text><line x1="276" y1="345" x2="276" y2="613" stroke="#D8DEE8"/><text x="300" y="585" class="font ink" font-size="24" font-weight="400">平台型、圈層型、語音／諧音型、二創型</text><line x1="886" y1="345" x2="886" y2="613" stroke="#D8DEE8"/><text x="910" y="585" class="font ink" font-size="24" font-weight="400">影響傳播速度與使用範圍</text>
    <text x="88" y="665" class="font warm" font-size="24" font-weight="700">關鍵判斷</text>
    <rect x="86" y="695" width="760" height="144" fill="#fff" stroke="#D8DEE8" stroke-width="2"/><rect x="86" y="695" width="760" height="40" fill="#EDF2F7" stroke="#D8DEE8"/><text x="110" y="729" class="font muted" font-size="18" font-weight="700">問題</text><line x1="416" y1="695" x2="416" y2="839" stroke="#D8DEE8"/><text x="440" y="729" class="font muted" font-size="18" font-weight="700">意義</text><rect x="86" y="735" width="760" height="52" fill="#fff" stroke="#D8DEE8"/><text x="110" y="769" class="font ink" font-size="21" font-weight="400">是否依賴特定事件？</text><line x1="416" y1="695" x2="416" y2="839" stroke="#D8DEE8"/><text x="440" y="769" class="font ink" font-size="21" font-weight="400">越依賴，越容易死語化</text><rect x="86" y="787" width="760" height="52" fill="#fff" stroke="#D8DEE8"/><text x="110" y="821" class="font ink" font-size="21" font-weight="400">是否能表達普遍情緒？</text><line x1="416" y1="695" x2="416" y2="839" stroke="#D8DEE8"/><text x="440" y="821" class="font ink" font-size="21" font-weight="400">越能表達日常情緒，越容易留下</text>
    <text x="890" y="736" class="font ink" font-size="30" font-weight="700">小結：來源決定起點，</text><text x="890" y="775" class="font ink" font-size="30" font-weight="700">語境依賴影響壽命。</text>
</svg>