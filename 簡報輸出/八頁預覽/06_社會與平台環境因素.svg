<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
<rect width="1600" height="900" fill="#F7F8FA"/>
<style>.font{font-family:"Microsoft JhengHei","Noto Sans TC",Arial,sans-serif}.ink{fill:#172033}.muted{fill:#5B6475}.accent{fill:#2F6F73}.warm{fill:#C56A2C}</style>
<text x="84" y="82" class="font accent" font-size="24" font-weight="700">第 6 頁</text>
<text x="84" y="152" class="font ink" font-size="44" font-weight="700">社會與平台環境因素</text>
<line x1="84" y1="247" x2="1518" y2="247" stroke="#D8DEE8" stroke-width="2"/>
<text x="88" y="300" class="font ink" font-size="28" font-weight="700">流行語的盛衰不只是詞語本身的問題，也受到使用者、平台與身份認同影響。</text>
    <text x="88" y="375" class="font warm" font-size="24" font-weight="700">影響因素</text>
    <rect x="86" y="410" width="690" height="286" fill="#fff" stroke="#D8DEE8" stroke-width="2"/><rect x="86" y="410" width="690" height="52" fill="#EDF2F7" stroke="#D8DEE8"/><text x="110" y="444" class="font muted" font-size="18" font-weight="700">因素</text><line x1="276" y1="410" x2="276" y2="696" stroke="#D8DEE8"/><text x="300" y="444" class="font muted" font-size="18" font-weight="700">影響</text><rect x="86" y="462" width="690" height="78" fill="#fff" stroke="#D8DEE8"/><text x="110" y="506" class="font ink" font-size="20" font-weight="700">使用者世代</text><line x1="276" y1="410" x2="276" y2="696" stroke="#D8DEE8"/><text x="300" y="506" class="font ink" font-size="20" font-weight="400">小圈層推動流行；新世代不接續就衰退</text><rect x="86" y="540" width="690" height="78" fill="#fff" stroke="#D8DEE8"/><text x="110" y="584" class="font ink" font-size="20" font-weight="700">平台環境</text><line x1="276" y1="410" x2="276" y2="696" stroke="#D8DEE8"/><text x="300" y="584" class="font ink" font-size="20" font-weight="400">短影音爆紅快、退燒快；論壇較容易累積文字梗</text><rect x="86" y="618" width="690" height="78" fill="#fff" stroke="#D8DEE8"/><text x="110" y="662" class="font ink" font-size="20" font-weight="700">身分認同</text><line x1="276" y1="410" x2="276" y2="696" stroke="#D8DEE8"/><text x="300" y="662" class="font ink" font-size="20" font-weight="400">懂梗代表圈內身份；過度大眾化會失去酷感</text>
    <text x="850" y="375" class="font warm" font-size="24" font-weight="700">轉折解釋</text>
    <rect x="840" y="410" width="630" height="286" fill="#fff" stroke="#D8DEE8" stroke-width="2"/><rect x="840" y="410" width="630" height="52" fill="#EDF2F7" stroke="#D8DEE8"/><text x="864" y="444" class="font muted" font-size="18" font-weight="700">轉折</text><line x1="1060" y1="410" x2="1060" y2="696" stroke="#D8DEE8"/><text x="1084" y="444" class="font muted" font-size="18" font-weight="700">可能原因</text><rect x="840" y="462" width="630" height="78" fill="#fff" stroke="#D8DEE8"/><text x="864" y="506" class="font ink" font-size="22" font-weight="700">上升到成熟</text><line x1="1060" y1="410" x2="1060" y2="696" stroke="#D8DEE8"/><text x="1084" y="506" class="font ink" font-size="22" font-weight="400">使用者擴大、群體模仿</text><rect x="840" y="540" width="630" height="78" fill="#fff" stroke="#D8DEE8"/><text x="864" y="584" class="font ink" font-size="22" font-weight="700">成熟到衰退</text><line x1="1060" y1="410" x2="1060" y2="696" stroke="#D8DEE8"/><text x="1084" y="584" class="font ink" font-size="22" font-weight="400">過度大眾化、平台風向轉移</text><rect x="840" y="618" width="630" height="78" fill="#fff" stroke="#D8DEE8"/><text x="864" y="662" class="font ink" font-size="22" font-weight="700">衰退到死語</text><line x1="1060" y1="410" x2="1060" y2="696" stroke="#D8DEE8"/><text x="1084" y="662" class="font ink" font-size="22" font-weight="400">新世代不接續、語境消失</text>
</svg>