<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
<rect width="1600" height="900" fill="#F7F8FA"/>
<style>.font{font-family:"Microsoft JhengHei","Noto Sans TC",Arial,sans-serif}.ink{fill:#172033}.muted{fill:#5B6475}.accent{fill:#2F6F73}.warm{fill:#C56A2C}</style>
<text x="84" y="82" class="font accent" font-size="24" font-weight="700">第 8 頁</text>
<text x="84" y="152" class="font ink" font-size="44" font-weight="700">結論與核心文獻</text>
<line x1="84" y1="247" x2="1518" y2="247" stroke="#D8DEE8" stroke-width="2"/>
<text x="88" y="305" class="font warm" font-size="24" font-weight="700">結論</text>
    <rect x="86" y="340" width="680" height="196" fill="#fff" stroke="#D8DEE8" stroke-width="2"/><rect x="86" y="340" width="680" height="52" fill="#EDF2F7" stroke="#D8DEE8"/><text x="110" y="374" class="font muted" font-size="18" font-weight="700">類型</text><line x1="346" y1="340" x2="346" y2="536" stroke="#D8DEE8"/><text x="370" y="374" class="font muted" font-size="18" font-weight="700">結果</text><rect x="86" y="392" width="680" height="72" fill="#fff" stroke="#D8DEE8"/><text x="110" y="436" class="font ink" font-size="21" font-weight="700">事件型流行語</text><line x1="346" y1="340" x2="346" y2="536" stroke="#D8DEE8"/><text x="370" y="436" class="font ink" font-size="21" font-weight="400">依賴共同記憶，容易快速死亡</text><rect x="86" y="464" width="680" height="72" fill="#fff" stroke="#D8DEE8"/><text x="110" y="508" class="font ink" font-size="21" font-weight="700">情緒表達型流行語</text><line x1="346" y1="340" x2="346" y2="536" stroke="#D8DEE8"/><text x="370" y="508" class="font ink" font-size="21" font-weight="400">可進入日常情緒表達，較容易留下</text>
    <text x="825" y="305" class="font warm" font-size="24" font-weight="700">核心觀點</text>
    <text x="825" y="360" class="font ink" font-size="28" font-weight="700">流行語的死亡，不只是因為大家不再使用它，</text>
    <text x="825" y="400" class="font ink" font-size="28" font-weight="700">而是支撐它的語境、情緒共鳴、社群規範</text>
    <text x="825" y="440" class="font ink" font-size="28" font-weight="700">與二創活動逐漸消失。</text>
    <text x="88" y="560" class="font warm" font-size="24" font-weight="700">核心文獻</text>
    <rect x="86" y="595" width="1360" height="208" fill="#fff" stroke="#D8DEE8" stroke-width="2"/><rect x="86" y="595" width="1360" height="40" fill="#EDF2F7" stroke="#D8DEE8"/><text x="110" y="629" class="font muted" font-size="18" font-weight="700">文獻</text><line x1="676" y1="595" x2="676" y2="803" stroke="#D8DEE8"/><text x="700" y="629" class="font muted" font-size="18" font-weight="700">本文參考用途</text><rect x="86" y="635" width="1360" height="56" fill="#fff" stroke="#D8DEE8"/><text x="110" y="673" class="font ink" font-size="19" font-weight="700">《華語流行語的使用分析與教學建議》</text><line x1="676" y1="595" x2="676" y2="803" stroke="#D8DEE8"/><text x="700" y="673" class="font ink" font-size="19" font-weight="400">流行語來源、結構、語意、語用分類</text><rect x="86" y="691" width="1360" height="56" fill="#fff" stroke="#D8DEE8"/><text x="110" y="729" class="font ink" font-size="19" font-weight="700">User Lifecycle and Linguistic Change in Online Communities</text><line x1="676" y1="595" x2="676" y2="803" stroke="#D8DEE8"/><text x="700" y="729" class="font ink" font-size="19" font-weight="400">線上社群語言規範與使用者生命週期</text><rect x="86" y="747" width="1360" height="56" fill="#fff" stroke="#D8DEE8"/><text x="110" y="785" class="font ink" font-size="19" font-weight="700">Labov, Principles of Linguistic Change: Social Factors</text><line x1="676" y1="595" x2="676" y2="803" stroke="#D8DEE8"/><text x="700" y="785" class="font ink" font-size="19" font-weight="400">社會因素、世代、身份認同對語言變化的影響</text>
</svg>