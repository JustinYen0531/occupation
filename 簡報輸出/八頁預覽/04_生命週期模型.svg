<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
<rect width="1600" height="900" fill="#F7F8FA"/>
<style>.font{font-family:"Microsoft JhengHei","Noto Sans TC",Arial,sans-serif}.ink{fill:#172033}.muted{fill:#5B6475}.accent{fill:#2F6F73}.warm{fill:#C56A2C}</style>
<text x="84" y="82" class="font accent" font-size="24" font-weight="700">第 4 頁</text>
<text x="84" y="152" class="font ink" font-size="44" font-weight="700">生命週期模型</text>
<line x1="84" y1="247" x2="1518" y2="247" stroke="#D8DEE8" stroke-width="2"/>
<rect x="86" y="295" width="1360" height="340" fill="#fff" stroke="#D8DEE8" stroke-width="2"/><rect x="86" y="295" width="1360" height="52" fill="#EDF2F7" stroke="#D8DEE8"/><text x="110" y="329" class="font muted" font-size="22" font-weight="700">階段</text><line x1="326" y1="295" x2="326" y2="635" stroke="#D8DEE8"/><text x="350" y="329" class="font muted" font-size="22" font-weight="700">特徵</text><line x1="786" y1="295" x2="786" y2="635" stroke="#D8DEE8"/><text x="810" y="329" class="font muted" font-size="22" font-weight="700">可觀察指標</text><rect x="86" y="347" width="1360" height="72" fill="#fff" stroke="#D8DEE8"/><text x="110" y="391" class="font ink" font-size="27" font-weight="700">上升期</text><line x1="326" y1="295" x2="326" y2="635" stroke="#D8DEE8"/><text x="350" y="391" class="font ink" font-size="27" font-weight="400">被事件或語境帶起</text><line x1="786" y1="295" x2="786" y2="635" stroke="#D8DEE8"/><text x="810" y="391" class="font ink" font-size="27" font-weight="400">搜尋量、貼文數增加</text><rect x="86" y="419" width="1360" height="72" fill="#fff" stroke="#D8DEE8"/><text x="110" y="463" class="font ink" font-size="27" font-weight="700">成熟期</text><line x1="326" y1="295" x2="326" y2="635" stroke="#D8DEE8"/><text x="350" y="463" class="font ink" font-size="27" font-weight="400">大量使用、改寫、二創</text><line x1="786" y1="295" x2="786" y2="635" stroke="#D8DEE8"/><text x="810" y="463" class="font ink" font-size="27" font-weight="400">變體、梗圖、短影音增加</text><rect x="86" y="491" width="1360" height="72" fill="#fff" stroke="#D8DEE8"/><text x="110" y="535" class="font ink" font-size="27" font-weight="700">衰退期</text><line x1="326" y1="295" x2="326" y2="635" stroke="#D8DEE8"/><text x="350" y="535" class="font ink" font-size="27" font-weight="400">使用下降、被說過氣</text><line x1="786" y1="295" x2="786" y2="635" stroke="#D8DEE8"/><text x="810" y="535" class="font ink" font-size="27" font-weight="400">出現老梗、過氣討論</text><rect x="86" y="563" width="1360" height="72" fill="#fff" stroke="#D8DEE8"/><text x="110" y="607" class="font ink" font-size="27" font-weight="700">死語期</text><line x1="326" y1="295" x2="326" y2="635" stroke="#D8DEE8"/><text x="350" y="607" class="font ink" font-size="27" font-weight="400">只剩回顧或解釋</text><line x1="786" y1="295" x2="786" y2="635" stroke="#D8DEE8"/><text x="810" y="607" class="font ink" font-size="27" font-weight="400">新使用者需要被解釋</text>
    <text x="92" y="710" class="font warm" font-size="24" font-weight="700">成熟期判準</text>
    <text x="92" y="762" class="font accent" font-size="31" font-weight="700">二創能力 = 是否成熟的重要指標</text>
    <text x="640" y="762" class="font ink" font-size="29" font-weight="700">不是被看見就成熟，而是被共同使用、改寫與模仿。</text>
</svg>