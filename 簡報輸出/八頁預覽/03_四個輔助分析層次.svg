<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
<rect width="1600" height="900" fill="#F7F8FA"/>
<style>.font{font-family:"Microsoft JhengHei","Noto Sans TC",Arial,sans-serif}.ink{fill:#172033}.muted{fill:#5B6475}.accent{fill:#2F6F73}.warm{fill:#C56A2C}</style>
<text x="84" y="82" class="font accent" font-size="24" font-weight="700">第 3 頁</text>
<text x="84" y="152" class="font ink" font-size="44" font-weight="700">四個輔助分析層次</text>
<line x1="84" y1="247" x2="1518" y2="247" stroke="#D8DEE8" stroke-width="2"/>
<rect x="86" y="300" width="1360" height="340" fill="#fff" stroke="#D8DEE8" stroke-width="2"/><rect x="86" y="300" width="1360" height="52" fill="#EDF2F7" stroke="#D8DEE8"/><text x="110" y="334" class="font muted" font-size="22" font-weight="700">層次</text><line x1="326" y1="300" x2="326" y2="640" stroke="#D8DEE8"/><text x="350" y="334" class="font muted" font-size="22" font-weight="700">決定什麼</text><line x1="726" y1="300" x2="726" y2="640" stroke="#D8DEE8"/><text x="750" y="334" class="font muted" font-size="22" font-weight="700">例子方向</text><rect x="86" y="352" width="1360" height="72" fill="#fff" stroke="#D8DEE8"/><text x="110" y="396" class="font ink" font-size="27" font-weight="700">構詞來源</text><line x1="326" y1="300" x2="326" y2="640" stroke="#D8DEE8"/><text x="350" y="396" class="font ink" font-size="27" font-weight="400">初始爆紅方式</text><line x1="726" y1="300" x2="726" y2="640" stroke="#D8DEE8"/><text x="750" y="396" class="font ink" font-size="27" font-weight="400">事件、平台、輸入習慣</text><rect x="86" y="424" width="1360" height="72" fill="#fff" stroke="#D8DEE8"/><text x="110" y="468" class="font ink" font-size="27" font-weight="700">詞語結構</text><line x1="326" y1="300" x2="326" y2="640" stroke="#D8DEE8"/><text x="350" y="468" class="font ink" font-size="27" font-weight="400">傳播效率</text><line x1="726" y1="300" x2="726" y2="640" stroke="#D8DEE8"/><text x="750" y="468" class="font ink" font-size="27" font-weight="400">擬音、英數混合、短語模板</text><rect x="86" y="496" width="1360" height="72" fill="#fff" stroke="#D8DEE8"/><text x="110" y="540" class="font ink" font-size="27" font-weight="700">語意指涉</text><line x1="326" y1="300" x2="326" y2="640" stroke="#D8DEE8"/><text x="350" y="540" class="font ink" font-size="27" font-weight="400">語境依賴程度</text><line x1="726" y1="300" x2="726" y2="640" stroke="#D8DEE8"/><text x="750" y="540" class="font ink" font-size="27" font-weight="400">事件、情緒、評價、圈層</text><rect x="86" y="568" width="1360" height="72" fill="#fff" stroke="#D8DEE8"/><text x="110" y="612" class="font ink" font-size="27" font-weight="700">語用功能</text><line x1="326" y1="300" x2="326" y2="640" stroke="#D8DEE8"/><text x="350" y="612" class="font ink" font-size="27" font-weight="400">是否能日常使用</text><line x1="726" y1="300" x2="726" y2="640" stroke="#D8DEE8"/><text x="750" y="612" class="font ink" font-size="27" font-weight="400">吐槽、接梗、表態、共鳴</text>
    <text x="92" y="742" class="font warm" font-size="24" font-weight="700">小結</text>
    <text x="92" y="790" class="font ink" font-size="24">它怎麼紅？為什麼好傳？離開語境後還能不能懂？能不能變成日常互動工具？</text>
</svg>