  <rect x="86" y="307" width="1386" height="194" fill="#fff" stroke="#D8DEE8" stroke-width="2"/><rect x="86" y="307" width="1386" height="38" fill="#EDF2F7" stroke="#D8DEE8"/><text x="106" y="334" class="font muted" font-size="18" font-weight="700">文獻</text><line x1="686" y1="307" x2="686" y2="501" stroke="#D8DEE8"/><text x="706" y="334" class="font muted" font-size="18" font-weight="700">本文參考用途</text><rect x="86" y="345" width="1386" height="52" fill="#fff" stroke="#D8DEE8"/><text x="106" y="377" class="font ink" font-size="20" font-weight="700">《華語流行語的使用分析與教學建議》</text><line x1="686" y1="307" x2="686" y2="501" stroke="#D8DEE8"/><text x="706" y="377" class="font ink" font-size="20" font-weight="400">流行語來源、結構、語意、語用分類</text><rect x="86" y="397" width="1386" height="52" fill="#fff" stroke="#D8DEE8"/><text x="106" y="429" class="font ink" font-size="20" font-weight="700">User Lifecycle and Linguistic Change in Online Communities</text><line x1="686" y1="307" x2="686" y2="501" stroke="#D8DEE8"/><text x="706" y="429" class="font ink" font-size="20" font-weight="400">線上社群語言規範與使用者生命週期</text><rect x="86" y="449" width="1386" height="52" fill="#fff" stroke="#D8DEE8"/><text x="106" y="481" class="font ink" font-size="20" font-weight="700">Labov, Principles of Linguistic Change: Social Factors</text><line x1="686" y1="307" x2="686" y2="501" stroke="#D8DEE8"/><text x="706" y="481" class="font ink" font-size="20" font-weight="400">社會因素、世代、身份認同對語言變化的影響</text>
  <text x="86" y="535" class="font warm" font-size="24" font-weight="700">APA 格式參考文獻</text>
  <text x="94" y="555" class="font accent" font-size="20" font-weight="700">1.</text>
    <text x="126" y="555" class="font ink" font-size="19">吳思平（2019）。華語流行語的使用分析與教學建議：以卡提諾狂新聞為語料範圍〔碩士論文，國立政治大學〕。</text><text x="126" y="580" class="font ink" font-size="19">政大學術集成。http://nccur.lib.nccu.edu.tw/handle/140.119/125631</text><text x="94" y="625" class="font accent" font-size="20" font-weight="700">2.</text>
    <text x="126" y="625" class="font ink" font-size="19">Danescu-Niculescu-Mizil, C., West, R., Jurafsky, D., Leskovec, J., &amp; Potts, C. (2013).</text><text x="126" y="650" class="font ink" font-size="19">No country for old members: User lifecycle and linguistic change in online communities.</text><text x="126" y="675" class="font ink" font-size="19">In Proceedings of the 22nd International Conference on World Wide Web (pp. 307–318). ACM.</text><text x="126" y="700" class="font ink" font-size="19">https://doi.org/10.1145/2488388.2488416</text><text x="94" y="755" class="font accent" font-size="20" font-weight="700">3.</text>
