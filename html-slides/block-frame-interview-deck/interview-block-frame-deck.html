age":15,"text":"「你的職涯有 30年,你是忍不了那麼久的」"},{"page":15,"text":"同屆財管系到現在「去科技業做非財務工作的人不到 10%」"},{"page":15,"text":"「根本沒人在做(大數據) ,就一兩個啦」"},{"page":15,"text":"整場第四個核心金句"},{"page":15,"text":"「人只要對自己誠實就好」"},{"page":15,"text":"「就是要更了解自己才能誠實」"},{"page":16,"text":"「你很容易對自己喜歡的事情也會有幻覺」"},{"page":16,"text":"以為「我以為我討厭會計」"},{"page":16,"text":"結果「10年後發現,我比我想的還討厭會計」"},{"page":16,"text":"「通常一個人離開一個討厭的地方之後,你會雲淡風輕」"},{"page":16,"text":"「但是當你很客觀、不帶情緒去想這件事」"},{"page":16,"text":"「然後還發現說:哇我比我想的還討厭,那其實真的是討厭的」"},{"page":16,"text":"整場最強的「悔恨型建議」"},{"page":16,"text":"「我最後悔的就是沒有多做實習」"},{"page":16,"text":"「如果要做,一定要多做實習」"},{"page":16,"text":"「完全不是為了履歷好看而已」"},{"page":17,"text":"「你多做實習才知道(業界)幹嘛」"},{"page":17,"text":"「了解現實工作在幹嘛之後」"},{"page":17,"text":"「你就更知道你要下什麼去解決什麼問題」"},{"page":17,"text":"「不知道他要打造什麼東西」"},{"page":17,"text":"「不知道他用 AI 要幹嘛」"},{"page":17,"text":"「原本就有很多想要執行的東西」"},{"page":17,"text":"「可是他沒有時間,或者是他沒有執行力」"},{"page":17,"text":"「這人在 AI 時代很明顯」"},{"page":17,"text":"「有些人他缺的是生產力,他不缺邏輯」"},{"page":17,"text":"整場第五個核心金句"},{"page":17,"text":"「我不是叫 AI 去想解決方法,我是想好解決方法叫 AI 去執行」"},{"page":17,"text":"「重點是你去給他號令」"},{"page":18,"text":"「邏輯是你要知道你要什麼東西,然後你去打造他」"},{"page":18,"text":"「沒有辦法去 picture、沒有辦法去把這些東西視覺化在自己腦海中的人,就是第一個被淘汰的」"},{"page":18,"text":"「整個社會上多的是根本連 ChatGPT 都不會用的人」"},{"page":18,"text":"「甚至只是跟她聊天的人」"},{"page":18,"text":"「你以為的整個社會已經 AI 化了,但其實大多數人就是過他們的生活」"},{"page":18,"text":"大學 4年 / 研究所 2年都不用 AI → 想打造「硬實力」"},{"page":18,"text":"「再早個 5年,我可能可以認同」"},{"page":18,"text":"現在: 「這就是屬於缺乏社會敏感度」"},{"page":18,"text":"「只追求技術,但忽略了這個世界需要的技術是因為她有需求」"},{"page":18,"text":"「他停留在『人家給他問題,他去解決』」"},{"page":18,"text":"「而不是有一個更大方向的需求,然後你設計出問題、你去解決」"},{"page":18,"text":"結果: 「這個人的影響力就是 1 顆螺絲釘」"},{"page":19,"text":"「社會最忌諱的事情是極端」"},{"page":19,"text":"「你完全相信 AI ,跟你完全相信自己的基本功,都會有問題」"},{"page":19,"text":"「0 跟 100 都是不對的」"},{"page":19,"text":"「最佳解可能在 30、可能在 75」"},{"page":19,"text":"「這就是你要透過實驗去驗證」"},{"page":19,"text":"「AI 是表象,資料邏輯是根本」"},{"page":19,"text":"「這張表格要長怎樣、資料庫到底要長怎樣」"},{"page":19,"text":"「這東西其實是先於 AI」"},{"page":19,"text":"「你要先會這個東西才能去談」"},{"page":19,"text":"「AI 只是讓實作這一塊變得容易」"},{"page":19,"text":"「你要去多方涉獵這些數據代表什麼」"},{"page":19,"text":"「因為這就是這個社會的模樣」"},{"page":19,"text":"「這個社會也代表著他需要什麼樣的人」"},{"page":19,"text":"「那就代表著會開出什麼樣的職缺」"},{"page":20,"text":"「我們怎麼樣不被 AI 取代?」"},{"page":20,"text":"「我不是叫 AI 去想解決方法,我是想好解決方法叫 AI 去執行」"},{"page":20,"text":"我做的「奇怪小東西」會不會其實是趨勢?"},{"page":20,"text":"「核心價值是讓一個獨特的領域有價值」"},{"page":20,"text":"「不要 all in ,像投資一樣」"},{"page":21,"text":"📖 十一、 商科生在 A I 時代的 「文科優勢」 ⭐ ⭐ ⭐ ⭐"},{"page":21,"text":"直到 niche 真的「在可預見的未來有機會走某一個成功模式」"},{"page":21,"text":"「你光靠你跨領域的背景,你在某件事情上可能就可以做到很立體,而且很厲害」"},{"page":21,"text":"用「研究財報」的方法研究每個客戶"},{"page":21,"text":"在公司內部成為「解釋模型的高手」"},{"page":21,"text":"「文科生會更瞭解(社會)」"},{"page":22,"text":"「這個社會運作的方式」包含:"},{"page":22,"text":"「你要入是你才有可能去讓你的產品有 impact」"},{"page":22,"text":"「才有可能去做出別人沒辦法做出來的解決方案」"},{"page":22,"text":"「我到現在還是非常認同,而且我越來越認同這件事情」"},{"page":22,"text":"「因為你要去理解那些在位階上的人怎麼做決策」"},{"page":22,"text":"「那些 stakeholder 怎麼做決策、他為什麼這樣做、他可能以後會怎麼做」"},{"page":22,"text":"「你要有一個核心的專業,也不見得要是你現在選的」"},{"page":22,"text":"「但是你終究得有一個核心的專業」"},{"page":22,"text":"「然後用你的專業去解決其他領域的問題」"},{"page":22,"text":"「這就是把你的價值最大化、把你的影響力最大化」"},{"page":23,"text":"「AI 感覺要把這個職位相關要會的東西都扼殺掉了」"},{"page":23,"text":"「很多是大學教授很知名的大學教授出來開的課」"},{"page":23,"text":"「上完還可以在履歷上有一個證書」"},{"page":23,"text":"「你花個五六百萬,其實沒啥意義」"},{"page":23,"text":"不如「兩三年不工作,拿那五六百萬的機會成本好好的把一些東西學起來」"},{"page":23,"text":"「還比你出國唸書有用」"},{"page":23,"text":"「進台積電這種明確需要碩士的目標 → 直接念,不用想」"},{"page":23,"text":"「因為有些東西是明確的,有些東西不是」"},{"page":23,"text":"「AI 讓很多領域的所謂原本專精的領域變得也沒有那麼專精了」"},{"page":24,"text":"「如果我需要我就是會去念」"},{"page":24,"text":"「人就是要跟著時代去走」"},{"page":24,"text":"「你要學一個理論變得更容易」"},{"page":24,"text":"「你去念到一個學歷,他的護城河也變弱了」"},{"page":24,"text":"「不是不去念書,而是要更謹慎」"},{"page":24,"text":"「因為我現在在 train AI 取代我」"},{"page":24,"text":"「但是我自己有開公司,現在在非洲」"},{"page":24,"text":"「也是運用我當年在會計系學的東西,那些我真正想用的東西」"},{"page":24,"text":"「你未來在某個時間點,可能會用很怪異的方式,把你曾經學到的東西全部連在一起」"},{"page":25,"text":"「技多不壓身」的具體價值"},{"page":25,"text":"3. 「某一個很 niche 的能力,在未來你用到」"},{"page":25,"text":"4. 或者「因為你用那個能力認識某些人,然後有某些機會讓你去驗證」"},{"page":25,"text":"「這個東西的本質:你有理念但是缺執行力的人會有優勢」"},{"page":25,"text":"「我明確知道我要幹嘛」"},{"page":25,"text":"「我只是要叫你( AI )去做」"},{"page":25,"text":"「我反而是會得利的人」"},{"page":25,"text":"「現在的學生出社會還沒有累積到資本」"},{"page":25,"text":"「但是 AI 的資源跟晉升機會可能都掌握在已經卡好位、有資本的人身上」"},{"page":25,"text":"「我對未來是比較悲觀的」"},{"page":25,"text":"「你會的東西夠多、你夠了解這個社會的本質」"},{"page":25,"text":"「你會是更好做出高品質決策的人」"},{"page":25,"text":"核心金句"},{"page":26,"text":"「每一件事情、每一個危機出來,你都要去瞭解它的本質」"},{"page":26,"text":"「然後去瞭解誰會活下來、誰不會活下來」"},{"page":26,"text":"「事情出來的時候,大家都在恐慌、都在情緒」"},{"page":26,"text":"「你不要去聽那些人講話,稍微聽一下就好」"},{"page":26,"text":"「你自己去分析到底事情的本質是什麼」"},{"page":26,"text":"「你學越多東西,你就越不會被騙」"},{"page":26,"text":"「你也不會被情緒帶著走」"},{"page":26,"text":"「你越可以去挖掘出事情的本質」"},{"page":26,"text":"「跨領域的優勢就是你會更好的去解讀這個世界上的所有事情」"},{"page":26,"text":"20 幾歲 「人脈不是那麼重要」"},{"page":26,"text":"30 幾歲 「個人單打獨鬥是不夠的」"},{"page":27,"text":"「沒有一定要逼自己參與系上活動」"},{"page":27,"text":"「但還是要有一些系上的知心朋友」"},{"page":27,"text":"「真的覺得這個人未來可以幫得上你的忙的朋友」"},{"page":27,"text":"「看一個人的有沒有料,就看他周遭最熟的 5 個人取個平均,大概就是他了」"},{"page":27,"text":"對供需理論「眼睛亮了一樣」"},{"page":27,"text":"「試著拿你學到的理論,在生活上給自己一個命題去驗證」"},{"page":28,"text":"整場第六個核心金句"},{"page":28,"text":"「面試官根本不想看你的分數」"},{"page":28,"text":"「能不能把分數化為理論,從理論化為實務」"},{"page":28,"text":"「這個才是他們想要看到的人才」"},{"page":28,"text":"4. 「你才有辦法把一個東西玩到很通」"},{"page":28,"text":"「分數高不高不是那麼重要」"},{"page":28,"text":"「出社會一點都不重要」"},{"page":28,"text":"「找到第一份工作的時候就不重要」"},{"page":29,"text":"「政大人跟台大人的臨門一腳,就是政大人太過保守了」"},{"page":29,"text":"「很多東西其實在大學的時候就可以走」"},{"page":29,"text":"「我感覺你以我認識的政大人來講,你算是超級清新」"},{"page":29,"text":"「你基本上你有這種心態,你在台大、政大都一樣」"},{"page":29,"text":"「今天如果重來,我一定也會給你這些意見」"},{"page":29,"text":"「你的邏輯是對的,你的價值觀是對的」"},{"page":29,"text":"「我覺得這是一個蠻值得你花時間的地方」"},{"page":29,"text":"「還有很多年,一定會有很多自我懷疑」"},{"page":30,"text":"「政大學生很努力,但跟台大學生比有一個問題 :"},{"page":30,"text":"校風保守,大家比較不敢做跳脫思維的事」"},{"page":30,"text":"「整個會計系還是被余老師那個價值觀」"},{"page":30,"text":"「還是很多人覺得『瘋狂把會計系念好,去做相關的工作做一做』」"},{"page":30,"text":"「再想要怎麼辦,那是其實有點來不及了」"},{"page":30,"text":"「你大一就在做這件事情(訪談跨領域者)」"},{"page":30,"text":"「我覺得超棒的、就蠻厲害的」"},{"page":30,"text":"「你已經看透蠻多事情的本質」"},{"page":30,"text":"「我一點也不擔心你的未來」"},{"page":30,"text":"「你一定會修正到你想去的地方」"},{"page":30,"text":"整場第七個核心金句"},{"page":30,"text":"「你的決心比你念什麼科系重要多了」"},{"page":30,"text":"「現在又不是什麼三四十年前」"},{"page":30,"text":"「你真的想做什麼東西,你的決心比你念什麼科系重要多了」"},{"page":31,"text":"「決心跟有沒有辦法去做這些東西都要去驗證」"},{"page":31,"text":"「社會的變化要一直去觀察」"},{"page":31,"text":"「整個社會可能都長不一樣」"},{"page":31,"text":"整場第八個核心金句"},{"page":31,"text":"「絕對不要去脈絡化去討論一件事情」"},{"page":31,"text":"「一定要知道每件事情怎麼來的」"},{"page":31,"text":"「但同齡來講,待遇是不錯,生活狀況也不錯,也比較自由」"},{"page":31,"text":"「我從來沒有把自己當成功人士」"},{"page":31,"text":"「我也不覺得我要變成成功人士」"},{"page":31,"text":"「我再來一次,我還是會做一樣的事情」"},{"page":31,"text":"「不管是薪水待遇、眼界、解決問題的能力」"},{"page":31,"text":"「我都比蠻大一半的大學同學好」"},{"page":32,"text":"「家族其實沒什麼人在做這件事情」"},{"page":32,"text":"「大家這個家族的人還是比較傳統」"},{"page":32,"text":"「如果能幫上忙,我都盡量幫」"},{"page":32,"text":"「還是不要有冤枉路,正常走了」"},{"page":32,"text":"1. 「把職涯想成投資 —— 你是用你的時間,去買進你的職涯這張股票。」"},{"page":32,"text":"2. 「我不是叫 AI 去想解決方法,我是想好解決方法叫 AI 去執行。」"},{"page":32,"text":"3. 「人累積過的東西永遠會在;如果你真的有累積到東西,永遠會在某個時刻發光,然後幫你一把。」"},{"page":32,"text":"4. 「最忌諱的事情是極端 —— 你完全相信 AI 跟你完全相信自己的基本功,都會有問題。」"},{"page":32,"text":"5. 「面試官根本不想看你的分數,是要看你能不能把分數化為理論、把理論化為實務。」"},{"page":32,"text":"6. 「你的決心比你念什麼科系重要多了。」"},{"page":32,"text":"7. 「絕對不要去脈絡化去討論一件事情,一定要知道每件事情怎麼來的。」"},{"page":32,"text":"8. 「看一個人有沒有料,就看他周遭最熟的 5 個人取個平均,大概就是他了。」"},{"page":32,"text":"9. 「你會的東西夠多、你夠了解這個社會的本質,至少不會落於人後。」"},{"page":32,"text":"10. 「就是要對自己誠實 —— 要更了解自己才能誠實。」"}]}</script><script>
const data=JSON.parse(document.getElementById('data').textContent);let current=1,starFilter=0,expanded=false,quoteFilter='all',sideMode='nav';const openChapters=new Set();const nav=document.getElementById('nav'),content=document.getElementById('content'),quotes=document.getElementById('quotes'),quoteFilters=document.getElementById('quoteFilters'),navTools=document.getElementById('navTools'),quoteTools=document.getElementById('quoteTools'),modeNav=document.getElementById('modeNav'),modeQuotes=document.getElementById('modeQuotes'),search=document.getElementById('search');const esc=s=>String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));const cleanNavTitle=s=>String(s).replace(/(?:\s*⭐)+\s*$/,'').trim();const maxStars=p=>Math.max(p.stars||0,...p.sections.map(s=>s.stars||0));function pass(p){const q=search.value.trim().toLowerCase();if(starFilter&&maxStars(p)<starFilter)return false;if(!q)return true;return p.plain.toLowerCase().includes(q)}function chapterTitle(p){const lines=(p.plain||p.title||'').split('\n');const hit=lines.find(l=>/^[^\d\n]{0,6}[一二三四五六七八九十]+、/.test(l));return hit?cleanNavTitle(hit):null}function groupedPages(){let groups=[],g=null;data.pages.forEach(p=>{const title=chapterTitle(p);if(title||!g){g={title:title||'訪談開場',pages:[]};groups.push(g)}g.pages.push(p)});return groups}function pageButton(p){const b=document.createElement('button');b.className='navPage'+(p.num===current?' active':'');b.innerHTML=`<div class="navNum">${String(p.num).padStart(2,'0')}</div><div class="navTitle">${esc(cleanNavTitle(p.title))}</div><div class="navStars" aria-label="星等">${'⭐'.repeat(Math.min(5,Math.max(1,maxStars(p))))}</div>`;b.onclick=()=>{current=p.num;render()};return b}function renderNav(){nav.innerHTML='';let any=false;const q=search.value.trim();groupedPages().forEach((g,idx)=>{const pages=g.pages.filter(pass);if(!pages.length)return;any=true;const id=`${idx}-${g.title}`;const active=pages.some(p=>p.num===current);const open=q||active||openChapters.has(id);const wrap=document.createElement('div');wrap.className='chapterGroup'+(open?'':' closed');const btn=document.createElement('button');btn.className='chapterBtn';btn.innerHTML=`<span>${esc(g.title)}<small>${String(pages[0].num).padStart(2,'0')} - ${String(pages[pages.length-1].num).padStart(2,'0')} / ${pages.length} 頁</small></span><span>${open?'−':'+'}</span>`;btn.onclick=()=>{if(openChapters.has(id))openChapters.delete(id);else openChapters.add(id);renderNav()};const list=document.createElement('div');list.className='chapterPages';pages.forEach(p=>list.appendChild(pageButton(p)));wrap.appendChild(btn);wrap.appendChild(list);nav.appendChild(wrap)});if(!any)nav.innerHTML='<div class="empty">沒有符合條件的頁面</div>'}function blockHtml(b){if(b.type==='quote')return `<blockquote class="quoteBlock">${b.text.split('\n').map(x=>`<p>${esc(x)}</p>`).join('')}</blockquote>`;if(b.type==='list')return `<ul class="noteList">${b.items.map(x=>`<li>${esc(x)}</li>`).join('')}</ul>`;if(b.type==='callout')return `<div class="callout">${esc(b.text)}</div>`;if(b.type==='key')return `<div class="key">${esc(b.text)}</div>`;if(b.type==='subhead')return `<div class="note-subhead">${esc(b.text)}</div>`;return `<p class="para">${esc(b.text)}</p>`}function renderContent(){const p=data.pages.find(x=>x.num===current)||data.pages.find(pass)||data.pages[0];current=p.num;const secs=p.sections.map((s,i)=>`<article class="section ${expanded||i===0?'open':''}"><button class="sectionBtn"><span>${esc(s.heading)}</span><span>${s.stars?'⭐'.repeat(Math.min(5,s.stars)):''} ＋</span></button><div class="sectionBody">${s.blocks.map(blockHtml).join('')}</div></article>`).join('');content.innerHTML=`<section class="panel pageHead"><div class="pageNo">${String(p.num).padStart(2,'0')}</div><div><div class="label">原 PDF 第 ${p.num} 頁</div><h2>${esc(p.title)}</h2><p>這一頁保留整理後的重點筆記，下方原文區改用逐字稿初步配對段落，方便逐頁審核。</p></div></section><section class="panel"><div class="label">筆記式閱讀</div>${secs}<details><summary class="sectionBtn" style="border:3px solid var(--ink);background:var(--cyan);margin-top:18px;">查看對應逐字稿原文</summary><div class="sectionBody" style="display:block"><div class="raw">${esc(p.plain)}</div></div></details></section>`;content.querySelectorAll('.sectionBtn').forEach(btn=>btn.onclick=()=>btn.parentElement.classList.toggle('open'))}const quoteTypes=[['all','全部'],['career','職涯'],['ai','AI'],['accounting','會計/事務所'],['learning','學習方法'],['self','自我理解'],['people','人脈/社會']];function quoteType(t){t=String(t);if(/AI|ChatGPT|資料|模型|GPU|技術|工具|執行|生產力|builder|產品|工程/.test(t))return'ai';if(/會計|事務所|審計|財務|老師|余老師|CPA/.test(t))return'accounting';if(/職涯|工作|公司|薪水|轉職|履歷|面試|實習|科系|碩士|產業/.test(t))return'career';if(/學|分數|理論|統計|經濟|課|Notebook|方法|驗證|基本功/.test(t))return'learning';if(/自己|誠實|喜歡|討厭|決心|心情|迷惘|孤獨|自我/.test(t))return'self';if(/人脈|朋友|社會|世界|決策|家族|stakeholder|情緒|政大|台大/.test(t))return'people';return'career'}function quoteLabel(k){return (quoteTypes.find(x=>x[0]===k)||quoteTypes[0])[1]}function renderQuoteFilters(){quoteFilters.innerHTML='';quoteTypes.forEach(([key,label])=>{const b=document.createElement('button');b.className='quoteChip'+(quoteFilter===key?' on':'');const count=key==='all'?data.quotes.length:data.quotes.filter(x=>quoteType(x.text)===key).length;b.textContent=`${label} ${count}`;b.onclick=()=>{quoteFilter=key;renderQuoteFilters();renderQuotes()};quoteFilters.appendChild(b)})}function renderQuotes(){const q=search.value.trim().toLowerCase();quotes.innerHTML='';data.quotes.filter(x=>(quoteFilter==='all'||quoteType(x.text)===quoteFilter)&&(!q||x.text.toLowerCase().includes(q))).slice(0,140).forEach(x=>{const type=quoteType(x.text);const d=document.createElement('div');d.className='quote';d.innerHTML=`<small>PAGE ${String(x.page).padStart(2,'0')}</small><p>${esc(x.text)}</p><span class="quoteTag">${esc(quoteLabel(type))}</span>`;d.onclick=()=>{current=x.page;render()};quotes.appendChild(d)});if(!quotes.children.length)quotes.innerHTML='<div class="empty">沒有符合這個分類或搜尋的金句</div>'}function renderMode(){navTools.classList.toggle('hidden',sideMode!=='nav');quoteTools.classList.toggle('hidden',sideMode!=='quotes');modeNav.classList.toggle('on',sideMode==='nav');modeQuotes.classList.toggle('on',sideMode==='quotes')}function render(){renderMode();renderNav();renderContent();renderQuotes()}document.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));c.classList.add('on');starFilter=Number(c.dataset.star);render()});search.oninput=render;document.getElementById('expandAll').onclick=()=>{expanded=!expanded;document.getElementById('expandAll').textContent=expanded?'全部收合':'全部展開';renderContent()};document.getElementById('pageCount').textContent=data.pages.length;document.getElementById('sectionCount').textContent=data.pages.reduce((a,p)=>a+p.sections.length,0);document.getElementById('quoteCount').textContent=data.quotes.length;modeNav.onclick=()=>{sideMode='nav';renderMode()};modeQuotes.onclick=()=>{sideMode='quotes';renderMode()};renderQuoteFilters();render();
</script></body></html>
