<script>
const data=JSON.parse(document.getElementById('data').textContent);
let current=1;
let starFilter=0;
let expanded=false;
const nav=document.getElementById('nav'),content=document.getElementById('content'),quotes=document.getElementById('quotes'),search=document.getElementById('search');
function starCount(p){return Math.max(0,...p.lines.map(l=>(l.match(/⭐/g)||[]).length));}
function allQuotes(){const arr=[];data.pages.forEach(p=>p.lines.forEach(l=>{if((l.includes('「')||l.includes('」'))&&l.length>14){arr.push({page:p.num,text:l});}}));return arr;}
const quoteData=allQuotes();
document.getElementById('secCount').textContent=data.pages.reduce((a,p)=>a+p.sections.length,0);
document.getElementById('quoteCount').textContent=quoteData.length;
function esc(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function pass(p){const q=search.value.trim().toLowerCase();if(starFilter&&starCount(p)<starFilter)return false;if(!q)return true;return p.lines.join(' ').toLowerCase().includes(q);}
function renderNav(){nav.innerHTML='';data.pages.filter(pass).forEach(p=>{const b=document.createElement('button');b.className='navPage'+(p.num===current?' active':'');const stars='⭐'.repeat(Math.max(1,Math.min(5,starCount(p))));b.innerHTML=`<div class="navNum">${String(p.num).padStart(2,'0')}</div><div class="navTitle">${esc(p.main||p.title)}</div><div class="stars">${stars}</div>`;b.onclick=()=>{current=p.num;render();};nav.appendChild(b);});if(!nav.children.length)nav.innerHTML='<div class="empty">找不到符合條件的頁面</div>';}
function renderContent(){const p=data.pages.find(x=>x.num===current)||data.pages.find(pass)||data.pages[0];current=p.num;let sections=p.sections.map((s,i)=>{let body=s.body.length?s.body:[s.heading];let bodyHtml=body.map(x=>`<div class="line">${esc(x)}</div>`).join('');return `<article class="section ${expanded||i===0?'open':''}"><button class="sectionBtn"><span>${esc(s.heading)}</span><span>＋</span></button><div class="sectionBody">${bodyHtml}</div></article>`;}).join('');content.innerHTML=`<section class="panel pageHead"><div class="pageNo">${String(p.num).padStart(2,'0')}</div><div><div class="label">原 PDF 第 ${p.num} 頁</div><h2>${esc(p.main||p.title)}</h2><p>${esc(p.title)}</p></div></section><section class="panel"><div class="label">逐層展開內容</div>${sections}<details><summary class="sectionBtn" style="border:3px solid #000;background:var(--blue);margin-top:18px;">查看本頁完整原文</summary><div class="sectionBody" style="display:block"><div class="fullText">${esc(p.lines.join('\n'))}</div></div></details></section>`;content.querySelectorAll('.sectionBtn').forEach(btn=>btn.onclick=()=>btn.parentElement.classList.toggle('open'));}
function renderQuotes(){const q=search.value.trim().toLowerCase();quotes.innerHTML='';quoteData.filter(x=>!q||x.text.toLowerCase().includes(q)).slice(0,120).forEach(x=>{const d=document.createElement('div');d.className='quote';d.innerHTML=`<small>PAGE ${String(x.page).padStart(2,'0')}</small><p>${esc(x.text)}</p>`;d.onclick=()=>{current=x.page;render();};quotes.appendChild(d);});if(!quotes.children.length)quotes.innerHTML='<div class="empty">沒有符合搜尋的金句</div>';}
function render(){renderNav();renderContent();renderQuotes();}
