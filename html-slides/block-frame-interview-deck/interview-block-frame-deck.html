面世界的樣貌,我坦白說蠻不了解的」\n「我們其實畢業之後, 花蠻多時間評論這個老師的事」"}], "autofilled": true}, {"heading": "2 - 2 學界 vs 業界的 「時代脫節」 ⭐ ⭐ ⭐ ⭐", "stars": 4, "blocks": [{"type": "quote", "text": "「不太喜歡會計」\n「有一個疑惑:怎麼把這些所學用在工作上?」\n「形容詞的話,當時是很迷惘,甚至有一點排斥的,稍微有點負面」"}, {"type": "key", "text": "正面:認真、紮實"}, {"type": "subhead", "text": "審計課可以上到 6 小時"}, {"type": "subhead", "text": "假日來考期中考、期末考"}, {"type": "subhead", "text": "課程紮實,需要時間理解"}, {"type": "quote", "text": "「我們很敬佩他」\n負面: 「沒去事務所就是白唸」的偏見\n「沒有去過事務所的人,你就是白念」\n「沒有貢獻你該貢獻的所學」\n「沒有去過事務所的人會吃不了苦」"}, {"type": "subhead", "text": "受訪者的反駁"}, {"type": "quote", "text": "「會計系的學生去事務所算是一個蠻糟糕的選擇」\n「對於外面世界的樣貌,我坦白說蠻不了解的」\n「我們其實畢業之後, 花蠻多時間評論這個老師的事」"}, {"type": "subhead", "text": "老師認知停留在 30年前"}, {"type": "quote", "text": "老師以為的狀況是「二三十年前的傳產或百業」"}, {"type": "paragraph", "text": "認知本身沒錯, 但停留在 30年前"}, {"type": "quote", "text": "「有些老師甚至是德高望重的老師,他們沒有與時俱進」"}]}], "plain": "🔥 二、 對余老師與會計系價值觀的批判 ⭐ ⭐ ⭐ ⭐\n2 - 1 對余老師的綜合評價 ⭐ ⭐ ⭐\n2 - 2 學界 vs 業界的 「時代脫節」 ⭐ ⭐ ⭐ ⭐\n「不太喜歡會計」\n「有一個疑惑:怎麼把這些所學用在工作上?」\n「形容詞的話,當時是很迷惘,甚至有一點排斥的,稍微有點負面」\n正面:認真、紮實\n審計課可以上到 6 小時\n假日來考期中考、期末考\n課程紮實,需要時間理解\n「我們很敬佩他」\n負面: 「沒去事務所就是白唸」的偏見\n「沒有去過事務所的人,你就是白念」\n「沒有貢獻你該貢獻的所學」\n「沒有去過事務所的人會吃不了苦」\n受訪者的反駁\n「會計系的學生去事務所算是一個蠻糟糕的選擇」\n「對於外面世界的樣貌,我坦白說蠻不了解的」\n「我們其實畢業之後, 花蠻多時間評論這個老師的事」\n老師認知停留在 30年前\n老師以為的狀況是「二三十年前的傳產或百業」\n認知本身沒錯, 但停留在 30年前\n「有些老師甚至是德高望重的老師,他們沒有與時俱進」"}, {"num": 4, "title": "2 - 3 對 「審計 / 事務所」 這條路的全面批判 ⭐ ⭐ ⭐ ⭐ ⭐", "stars": 5, "sections": [{"heading": "2 - 3 對 「審計 / 事務所」 這條路的全面批判 ⭐ ⭐ ⭐ ⭐ ⭐", "stars": 5, "blocks": [{"type": "subhead", "text": "自信變成自傲"}, {"type": "quote", "text": "「他可以有自信,可是我覺得他變成自傲」\n自傲的盲點: 「整個時代在推移,但是你卻沒有前進」\n「這是一個在業界跟在學校當老師很容易出現的 gap」"}, {"type": "key", "text": "結構性矛盾:收企業錢、查企業"}, {"type": "quote", "text": "「你是要去查企業的人,可是你收他錢」\n「這一點本身就是我一直不能理解的事情」\n在許多假帳案件中, 「應該要質疑企業的地方」 ,他們沒做"}, {"type": "subhead", "text": "待遇每況愈下"}, {"type": "quote", "text": "「待遇或是影響力實在是太低落了」\n「而且是每況愈下」\n「10年前跟現在我們,尤其我們每一段時間都會拿出來比」\n行業吃「上市潮」\n業界「吃新公司上市潮」\n「當整個社會已經變得很成熟期,越來越少大型公司要上市的時候」\n「整個行業會變得可有可無」\n「你在這個局裡面你像是個局外人一樣」"}, {"type": "key", "text": "AI 衝擊:審計員是災區"}, {"type": "quote", "text": "「先不講他會被 AI 取代這件事情,而且是很嚴重,他算是災區」"}, {"type": "subhead", "text": "苦熬到頂也沒尊嚴"}, {"type": "quote", "text": "「就算你是苦了 30年,你當上合夥人,一樣是沒什麼尊嚴」"}]}], "plain": "2 - 3 對 「審計 / 事務所」 這條路的全面批判 ⭐ ⭐ ⭐ ⭐ ⭐\n自信變成自傲\n「他可以有自信,可是我覺得他變成自傲」\n自傲的盲點: 「整個時代在推移,但是你卻沒有前進」\n「這是一個在業界跟在學校當老師很容易出現的 gap」\n結構性矛盾:收企業錢、查企業\n「你是要去查企業的人,可是你收他錢」\n「這一點本身就是我一直不能理解的事情」\n在許多假帳案件中, 「應該要質疑企業的地方」 ,他們沒做\n待遇每況愈下\n「待遇或是影響力實在是太低落了」\n「而且是每況愈下」\n「10年前跟現在我們,尤其我們每一段時間都會拿出來比」\n行業吃「上市潮」\n業界「吃新公司上市潮」\n「當整個社會已經變得很成熟期,越來越少大型公司要上市的時候」\n「整個行業會變得可有可無」\n「你在這個局裡面你像是個局外人一樣」\nAI 衝擊:審計員是災區\n「先不講他會被 AI 取代這件事情,而且是很嚴重,他算是災區」\n苦熬到頂也沒尊嚴\n「就算你是苦了 30年,你當上合夥人,一樣是沒什麼尊嚴」"}, {"num": 5, "title": "2 - 4 台灣會計 / 財務環境的結構性問題 ⭐ ⭐ ⭐ ⭐", "stars": 5, "sections": [{"heading": "2 - 5 「傑出校友」 應該有的標準 ⭐ ⭐ ⭐", "stars": 3, "blocks": [{"type": "callout", "text": "這個格子是原筆記的章節標題。PDF 的內容接在同一頁的小節裡，下面已補入可閱讀的實際內容。"}, {"type": "list", "items": ["包含 / 對應小節: 3 - 1 轉職前的工作脈絡 ⭐ ⭐"]}, {"type": "key", "text": "補入內容來源: 3 - 1 轉職前的工作脈絡 ⭐ ⭐"}, {"type": "subhead", "text": "台灣 CEO 不喜歡找財務長當頭"}, {"type": "quote", "text": "結果是「財務部門變成:重點放在精準表達過去發生的事件」"}, {"type": "subhead", "text": "真正該有的能力"}, {"type": "quote", "text": "「能不能用過去的數據去推測未來的劇本」\n但「台灣這塊做得非常、非常不夠」"}, {"type": "subhead", "text": "國外的對比"}, {"type": "key", "text": "美國 :會計系分數通常在大學裡前 2、前 3 高 (財管、會計)"}, {"type": "quote", "text": "台灣 : 「會計這個學問在台灣決策中變得「可有可無」」\n「這是最大的問題」"}, {"type": "subhead", "text": "受訪者定義的核心價值"}], "autofilled": true}, {"heading": "💎 三、 轉職的關鍵時刻與方法論 ⭐ ⭐ ⭐ ⭐ ⭐", "stars": 5, "blocks": [{"type": "callout", "text": "這個格子是原筆記的章節標題。PDF 的內容接在同一頁的小節裡，下面已補入可閱讀的實際內容。"}, {"type": "list", "items": ["包含 / 對應小節: 3 - 1 轉職前的工作脈絡 ⭐ ⭐"]}, {"type": "key", "text": "補入內容來源: 3 - 1 轉職前的工作脈絡 ⭐ ⭐"}, {"type": "subhead", "text": "台灣 CEO 不喜歡找財務長當頭"}, {"type": "quote", "text": "結果是「財務部門變成:重點放在精準表達過去發生的事件」"}, {"type": "subhead", "text": "真正該有的能力"}, {"type": "quote", "text": "「能不能用過去的數據去推測未來的劇本」\n但「台灣這塊做得非常、非常不夠」"}, {"type": "subhead", "text": "國外的對比"}, {"type": "key", "text": "美國 :會計系分數通常在大學裡前 2、前 3 高 (財管、會計)"}, {"type": "quote", "text": "台灣 : 「會計這個學問在台灣決策中變得「可有可無」」\n「這是最大的問題」"}, {"type": "subhead", "text": "受訪者定義的核心價值"}], "autofilled": true}, {"heading": "3 - 1 轉職前的工作脈絡 ⭐ ⭐", "stars": 2, "blocks": [{"type": "subhead", "text": "台灣 CEO 不喜歡找財務長當頭"}, {"type": "quote", "text": "結果是「財務部門變成:重點放在精準表達過去發生的事件」"}, {"type": "subhead", "text": "真正該有的能力"}, {"type": "quote", "text": "「能不能用過去的數據去推測未來的劇本」\n但「台灣這塊做得非常、非常不夠」"}, {"type": "subhead", "text": "國外的對比"}, {"type": "key", "text": "美國 :會計系分數通常在大學裡前 2、前 3 高 (財管、會計)"}, {"type": "quote", "text": "台灣 : 「會計這個學問在台灣決策中變得「可有可無」」\n「這是最大的問題」"}, {"type": "subhead", "text": "受訪者定義的核心價值"}, {"type": "quote", "text": "不是「在事務所表現好」"}, {"type": "key", "text": "而是:"}, {"type": "quote", "text": "「你對社會、對學校或是對整個國家有沒有一些 impact」\n「你有沒有做出一些影響力」"}, {"type": "subhead", "text": "時間線"}, {"type": "paragraph", "text": "政大畢業 → 當兵 1年 → 事務所 1.5年 → 轉職"}]}], "plain": "2 - 4 台灣會計 / 財務環境的結構性問題 ⭐ ⭐ ⭐ ⭐\n2 - 5 「傑出校友」 應該有的標準 ⭐ ⭐ ⭐\n💎 三、 轉職的關鍵時刻與方法論 ⭐ ⭐ ⭐ ⭐ ⭐\n3 - 1 轉職前的工作脈絡 ⭐ ⭐\n台灣 CEO 不喜歡找財務長當頭\n結果是「財務部門變成:重點放在精準表達過去發生的事件」\n真正該有的能力\n「能不能用過去的數據去推測未來的劇本」\n但「台灣這塊做得非常、非常不夠」\n國外的對比\n美國 :會計系分數通常在大學裡前 2、前 3 高 (財管、會計)\n台灣 : 「會計這個學問在台灣決策中變得「可有可無」」\n「這是最大的問題」\n受訪者定義的核心價值\n不是「在事務所表現好」\n而是:\n「你對社會、對學校或是對整個國家有沒有一些 impact」\n「你有沒有做出一些影響力」\n時間線\n政大畢業 → 當兵 1年 → 事務所 1.5年 → 轉職"}, {"num": 6, "title": "3 - 2 為什麼想走 ? 三個關鍵感受 ⭐ ⭐ ⭐ ⭐ ⭐", "stars": 5, "sections": [{"heading": "3 - 3 ⭐ ⭐ ⭐ ⭐ ⭐ 核心方法論 : 「把職涯想成投資」", "stars": 5, "blocks": [{"type": "subhead", "text": "主管給很多自由"}, {"type": "quote", "text": "「主管給了很多自由 ,所以我並不是屬於那種走了會一直去罵那些人的人」\n「我也沒有在那邊開始準備, 我真的走的時候才開始準備」"}, {"type": "subhead", "text": "1 工作沒有產生價值"}, {"type": "quote", "text": "「沒有辦法說服自己我的工作有產生價值」\n「就是在照前人的程序再做東西, 你很少有可以設計的部分」"}]}, {"heading": "2 一直走下去不會贏別人", "stars": 0, "blocks": [{"type": "quote", "text": "「我覺得一直走下去,我不會比我周遭的人來的厲害」\n「當你覺得你在那個環境競爭不過其他人」"}, {"type": "subhead", "text": "3 薪水又很爛"}, {"type": "subhead", "text": "三個變數都中了 → 必須轉"}, {"type": "callout", "text": "⭐ 整場最重要的金句"}, {"type": "quote", "text": "「你是用你的時間,去買進你的職涯這張股票。」"}, {"type": "subhead", "text": "把工作當股票來研究"}, {"type": "key", "text": "你必須像研究公司一樣研究產業:"}, {"type": "subhead", "text": "看 earnings calls"}, {"type": "paragraph", "text": "看公司主力產品( 現在 + 未來 )"}, {"type": "subhead", "text": "看付給員工多少錢"}, {"type": "subhead", "text": "看你能走的方向有哪些公司"}]}], "plain": "3 - 2 為什麼想走 ? 三個關鍵感受 ⭐ ⭐ ⭐ ⭐ ⭐\n3 - 3 ⭐ ⭐ ⭐ ⭐ ⭐ 核心方法論 : 「把職涯想成投資」\n主管給很多自由\n「主管給了很多自由 ,所以我並不是屬於那種走了會一直去罵那些人的人」\n「我也沒有在那邊開始準備, 我真的走的時候才開始準備」\n1 工作沒有產生價值\n「沒有辦法說服自己我的工作有產生價值」\n「就是在照前人的程序再做東西, 你很少有可以設計的部分」\n2 一直走下去不會贏別人\n「我覺得一直走下去,我不會比我周遭的人來的厲害」\n「當你覺得你在那個環境競爭不過其他人」\n3 薪水又很爛\n三個變數都中了 → 必須轉\n⭐ 整場最重要的金句\n「你是用你的時間,去買進你的職涯這張股票。」\n把工作當股票來研究\n你必須像研究公司一樣研究產業:\n看 earnings calls\n看公司主力產品( 現在 + 未來 )\n看付給員工多少錢\n看你能走的方向有哪些公司"}, {"num": 7, "title": "3 - 4 自我探索的具體過程 ⭐ ⭐ ⭐ ⭐", "stars": 4, "sections": [{"heading": "3 - 5 怎麼挑選入門公司 ⭐ ⭐ ⭐ ⭐", "stars": 4, "blocks": [{"type": "subhead", "text": "受訪者強調"}, {"type": "quote", "text": "「既然我要花我人生這麼多的時間,每天三分之一的時間,去投入一件事情」\n「我當然要研究說我在投入什麼」\n「你把自己想成一間公司,你有去調查」\n從「對數字敏感」找到方向"}, {"type": "list", "items": ["1. 明確知道: 對數字敏感度高", "2. 既然不喜歡會計 → 必須把敏感度用在別處"]}, {"type": "quote", "text": "3. 發現自己喜歡「看著資料說一個故事」\n4. 想做的事: 「解析數據,提供商業價值」"}, {"type": "subhead", "text": "生活中的小例子"}, {"type": "quote", "text": "「這個月的電表上去了,原因是什麼?我們把它拆開來看,發生什麼事情」\n→ 這就是「看資料說故事」的思維"}, {"type": "subhead", "text": "不一定要走純技術路線"}, {"type": "quote", "text": "「我其實一開始就沒有想要往很 technical 的方向走」\n「到不是不喜歡,我還是有學那些程式」"}, {"type": "subhead", "text": "三個觀察維度"}, {"type": "list", "items": ["1. 哪個地方門檻比較低", "2. 哪個地方待遇還相對可以", "3. 哪個地方又是你可以學到比較多東西"]}, {"type": "quote", "text": "「分析公司 + 分析自己」"}]}], "plain": "3 - 4 自我探索的具體過程 ⭐ ⭐ ⭐ ⭐\n3 - 5 怎麼挑選入門公司 ⭐ ⭐ ⭐ ⭐\n受訪者強調\n「既然我要花我人生這麼多的時間,每天三分之一的時間,去投入一件事情」\n「我當然要研究說我在投入什麼」\n「你把自己想成一間公司,你有去調查」\n從「對數字敏感」找到方向\n1. 明確知道: 對數字敏感度高\n2. 既然不喜歡會計 → 必須把敏感度用在別處\n3. 發現自己喜歡「看著資料說一個故事」\n4. 想做的事: 「解析數據,提供商業價值」\n生活中的小例子\n「這個月的電表上去了,原因是什麼?我們把它拆開來看,發生什麼事情」\n→ 這就是「看資料說故事」的思維\n不一定要走純技術路線\n「我其實一開始就沒有想要往很 technical 的方向走」\n「到不是不喜歡,我還是有學那些程式」\n三個觀察維度\n1. 哪個地方門檻比較低\n2. 哪個地方待遇還相對可以\n3. 哪個地方又是你可以學到比較多東西\n「分析公司 + 分析自己」"}, {"num": 8, "title": "3 - 6 為什麼在 2020 抓到 A I 風口 ? ⭐ ⭐ ⭐ ⭐ ⭐", "stars": 5, "sections": [{"heading": "🎯 四、 職涯選擇的三個核心變數 ⭐ ⭐ ⭐ ⭐ ⭐", "stars": 5, "blocks": [{"type": "callout", "text": "這個格子是原筆記的章節標題。PDF 的內容接在同一頁的小節裡，下面已補入可閱讀的實際內容。"}, {"type": "list", "items": ["包含 / 對應小節: 4 - 1 ⭐ 受訪者的 「3 變數模型」"]}, {"type": "key", "text": "補入內容來源: 4 - 1 ⭐ 受訪者的 「3 變數模型」"}, {"type": "quote", "text": "「你必須去看那些業界的公司,然後去分析他們,然後去分析你自己,然後給你自己一個答案」"}, {"type": "subhead", "text": "訪談者的疑問"}, {"type": "paragraph", "text": "2020 還沒有 ChatGPT ,怎麼會知道 AI 是趨勢?"}, {"type": "key", "text": "關鍵情報來源: Meta 工程師朋友"}, {"type": "key", "text": "2018–2019 時,朋友告訴他:"}, {"type": "quote", "text": "GPU 適合做「一次很多重複的零到一運算」 → 拿來訓練 AI"}, {"type": "subhead", "text": "CPU 一次只能做一個複雜運算"}, {"type": "callout", "text": "結論:當時其實看得到"}], "autofilled": true}, {"heading": "4 - 1 ⭐ 受訪者的 「3 變數模型」", "stars": 1, "blocks": [{"type": "quote", "text": "「你必須去看那些業界的公司,然後去分析他們,然後去分析你自己,然後給你自己一個答案」"}, {"type": "subhead", "text": "訪談者的疑問"}, {"type": "paragraph", "text": "2020 還沒有 ChatGPT ,怎麼會知道 AI 是趨勢?"}, {"type": "key", "text": "關鍵情報來源: Meta 工程師朋友"}, {"type": "key", "text": "2018–2019 時,朋友告訴他:"}, {"type": "quote", "text": "GPU 適合做「一次很多重複的零到一運算」 → 拿來訓練 AI"}, {"type": "subhead", "text": "CPU 一次只能做一個複雜運算"}, {"type": "callout", "text": "結論:當時其實看得到"}, {"type": "quote", "text": "「那個時候其實離 ChatGPT 出來都還有 3年」\n「我那時候已經知道:原來 GPU 可以拿來訓練 AI 是這麼回事」\n「只是後來沒有人想到語言模型會那麼快跑出來」"}, {"type": "subhead", "text": "為什麼能看到?"}, {"type": "quote", "text": "「所以說當時看不到嗎?當時其實看得到」\n「怎麼樣你可以看的到?把你的職涯想成一個投資」"}, {"type": "subhead", "text": "職涯三大決定因素"}]}], "plain": "3 - 6 為什麼在 2020 抓到 A I 風口 ? ⭐ ⭐ ⭐ ⭐ ⭐\n🎯 四、 職涯選擇的三個核心變數 ⭐ ⭐ ⭐ ⭐ ⭐\n4 - 1 ⭐ 受訪者的 「3 變數模型」\n「你必須去看那些業界的公司,然後去分析他們,然後去分析你自己,然後給你自己一個答案」\n訪談者的疑問\n2020 還沒有 ChatGPT ,怎麼會知道 AI 是趨勢?\n關鍵情報來源: Meta 工程師朋友\n2018–2019 時,朋友告訴他:\nGPU 適合做「一次很多重複的零到一運算」 → 拿來訓練 AI\nCPU 一次只能做一個複雜運算\n結論:當時其實看得到\n「那個時候其實離 ChatGPT 出來都還有 3年」\n「我那時候已經知道:原來 GPU 可以拿來訓練 AI 是這麼回事」\n「只是後來沒有人想到語言模型會那麼快跑出來」\n為什麼能看到?\n「所以說當時看不到嗎?當時其實看得到」\n「怎麼樣你可以看的到?把你的職涯想成一個 fe\nbalance\n「跟你會不會、你的生活受影響嗎?我覺得這是綁在一 ...\n拿手 × 喜歡的四種組合\n喜歡不喜歡\n拿手 🟢 黃金組合 🟡 才能浪費\n不拿手 🟠 興趣 vs 能力 🔴 直接避開\n「甚至你可以再乘開:你的才能在你喜歡的東西上,但這個東西賺不賺錢」\n每學期結束都要做的事\n學完每一門課, 「回頭好好回想一下」 :\n三個維度各打分數: 拿手 +1 / 有興趣 +1 / 能應用 +1\n有沒有讓你興奮 ?\n你特別拿手嗎?\n學了能拿來幹嘛 ?\n分數很重要,但成就感不能只來自分數\n「成就感如果來自於分數,那不用拿來評比這件事情」\n成就感應該來自:\n「我學這個東西有沒有興奮」"}, {"num": 10, "title": "4 - 5 「心情騙不了人」 ⭐ ⭐ ⭐ ⭐ ⭐", "stars": 5, "sections": [{"heading": "📚 五、 商科背景的補強 : 應該學什麼 ? ⭐ ⭐ ⭐ ⭐ ⭐", "stars": 5, "blocks": [{"type": "callout", "text": "這個格子是原筆記的章節標題。PDF 的內容接在同一頁的小節裡，下面已補入可閱讀的實際內容。"}, {"type": "list", "items": ["包含 / 對應小節: 5 - 2 ⭐ 受訪者推薦的學習清單"]}, {"type": "key", "text": "補入內容來源: 5 - 2 ⭐ 受訪者推薦的學習清單"}, {"type": "quote", "text": "「我學這個東西有沒有很拿手」"}, {"type": "callout", "text": "整場另一個核心金句"}, {"type": "quote", "text": "「你的心情是騙不了人的」\n「尤其因為你投資很多時間在念書」\n「你有花很多時間下去的東西,你的心情是騙不了你的」"}, {"type": "subhead", "text": "受訪者的後悔"}, {"type": "quote", "text": "「我當年沒有人問,所以我很晚很晚才開始想這件事情」\n「所以如果今天有一個人才大一大二,我會想跟他說什麼,我就是會想這樣講」"}, {"type": "subhead", "text": "受訪者的觀點"}, {"type": "quote", "text": "「會計這個東西,你要會的程度,出社會補就好了」"}, {"type": "key", "text": "第一優先: 總體經濟學 ⭐ ⭐ ⭐ ⭐ ⭐"}], "autofilled": true}, {"heading": "5 - 1 ⭐ ⭐ ⭐ ⭐ ⭐ 「商科核心 = 統計 + 經濟」", "stars": 5, "blocks": [{"type": "callout", "text": "這個格子是原筆記的章節標題。PDF 的內容接在同一頁的小節裡，下面已補入可閱讀的實際內容。"}, {"type": "list", "items": ["包含 / 對應小節: 5 - 2 ⭐ 受訪者推薦的學習清單"]}, {"type": "key", "text": "補入內容來源: 5 - 2 ⭐ 受訪者推薦的學習清單"}, {"type": "quote", "text": "「我學這個東西有沒有很拿手」"}, {"type": "callout", "text": "整場另一個核心金句"}, {"type": "quote", "text": "「你的心情是騙不了人的」\n「尤其因為你投資很多時間在念書」\n「你有花很多時間下去的東西,你的心情是騙不了你的」"}, {"type": "subhead", "text": "受訪者的後悔"}, {"type": "quote", "text": "「我當年沒有人問,所以我很晚很晚才開始想這件事情」\n「所以如果今天有一個人才大一大二,我會想跟他說什麼,我就是會想這樣講」"}, {"type": "subhead", "text": "受訪者的觀點"}, {"type": "quote", "text": "「會計這個東西,你要會的程度,出社會補就好了」"}, {"type": "key", "text": "第一優先: 總體經濟學 ⭐ ⭐ ⭐ ⭐ ⭐"}], "autofilled": true}, {"heading": "5 - 2 ⭐ 受訪者推薦的學習清單", "stars": 1, "blocks": [{"type": "quote", "text": "「我學這個東西有沒有很拿手」"}, {"type": "callout", "text": "整場另一個核心 論 ⭐ ⭐ ⭐\n「通識也可以上一下」\n第五:財政、貨幣銀行學 ⭐ ⭐\n「那當然那個你一定會去念啦」\n核心邏輯:技術要有商業價值\n「技術要有商業價值,不然他沒有用」\n「一個好的工程師或好的科技業員工」\n「如果你想要有影響力之後當產品經理或高階主管」\n「你要意識到是技術要有商業價值」\n例外: 「除非你想要一輩子做科學研究」\n你想當什麼?"}, {"num": 12, "title": "5 - 5 平衡學業與興趣 ⭐ ⭐ ⭐ ⭐", "stars": 5, "sections": [{"heading": "5 - 5 平衡學業與興趣 ⭐ ⭐ ⭐ ⭐", "stars": 4, "blocks": [{"type": "paragraph", "text": "💼 六、 會計背景的實際價值 ⭐ ⭐ ⭐ ⭐ ⭐"}]}, {"heading": "6 - 1 「會不會覺得會計白學了 ?」 ⭐ ⭐ ⭐ ⭐ ⭐", "stars": 5, "blocks": [{"type": "callout", "text": "這個格子是原筆記的章節標題。PDF 的內容接在同一頁的小節裡，下面已補入可閱讀的實際內容。"}, {"type": "list", "items": ["包含 / 對應小節: 6 - 3 ⭐ ⭐ ⭐ ⭐ ⭐ 「累積過的東西永遠會在」"]}, {"type": "key", "text": "補入內容來源: 6 - 3 ⭐ ⭐ ⭐ ⭐ ⭐ 「累積過的東西永遠會在」"}, {"type": "quote", "text": "「如果你是想要當一個 builder ,你想要蓋東西」\n「你想要蓋一個有用的東西」\n「必須去瞭解這個世界的脈絡跟他的需求」\n受訪者支持「犧牲成績去玩 AI」"}, {"type": "subhead", "text": "受訪者的回答"}, {"type": "quote", "text": "「這個是一個很好的問題,但我從來沒有這樣想過,這真的是完全沒有」\n「當你做了真正想做的事, 前面走的就叫繞路」\n「他不會讓你覺得,因為他已經是沉沒成本了」"}, {"type": "subhead", "text": "即使轉行,會計訓練仍在發揮作用"}, {"type": "quote", "text": "但是:美國 CP A 「到現在根本沒用過」\n「會計系給我的邏輯還是在」\n「對數字的敏感度是絕對沒有問題的」\n「絕對有給我紮實的訓練」"}], "autofilled": true}, {"heading": "6 - 2 會計訓練的實際貢獻 ⭐ ⭐ ⭐ ⭐", "stars": 4, "blocks": [{"type": "callout", "text": "這個格子是原筆記的章節標題。PDF 的內容接在同一頁的小節裡，下面已補入可閱讀的實際內容。"}, {"type": "list", "items": ["包含 / 對應小節: 6 - 3 ⭐ ⭐ ⭐ ⭐ ⭐ 「累積過的東西永遠會在」"]}, {"type": "key", "text": "補入內容來源: 6 - 3 ⭐ ⭐ ⭐ ⭐ ⭐ 「累積過的東西永遠會在」"}, {"type": "quote", "text": "「如果你是想要當一個 builder ,你想要蓋東西」\n「你想要蓋一個有用的東西」\n「必須去瞭解這個世界的脈絡跟他的需求」\n受訪者支持「犧牲成績去玩 AI」"}, {"type": "subhead", "text": "受訪者的回答"}, {"type": "quote", "text": "「這個是一個很好的問題,但我從來沒有這樣想過,這真的是完全沒有」\n「當你做了真正想做的事, 前面走的就叫繞路」\n「他不會讓你覺得,因為他已經是沉沒成本了」"}, {"type": "subhead", "text": "即使轉行,會計訓練仍在發揮作用"}, {"type": "quote", "text": "但是:美國 CP A 「到現在根本沒用過」\n「會計系給我的邏輯還是在」\n「對數字的敏感度是絕對沒有問題的」\n「絕對有給我紮實的訓練」"}], "autofilled": true}, {"heading": "6 - 3 ⭐ ⭐ ⭐ ⭐ ⭐ 「累積過的東西永遠會在」", "stars": 5, "blocks": [{"type": "quote", "text": "「如果你是想要當一個 builder ,你想要蓋東西」\n「你想要蓋一個有用的東西」\n「必須去瞭解這個世界的脈絡跟他的需求」\n受訪者支持「犧牲成績去玩 AI」\n「雖然我這樣講很不負責任,但其實我聽到蠻開心的」\n「 head", "text": "邏輯好"}, {"type": "subhead", "text": "情緒管理好"}, {"type": "subhead", "text": "做事穩定"}, {"type": "subhead", "text": "解決問題能力強"}, {"type": "subhead", "text": "真正的社會運作"}]}], "plain": "10 - 4 跨領域的 「立體優勢」 ⭐ ⭐ ⭐ ⭐ ⭐\n📖 十一、 商科生在 A I 時代的 「文科優勢」 ⭐ ⭐ ⭐ ⭐\n11 - 1 文科 vs 理科 ⭐ ⭐ ⭐ ⭐\n11 - 2 ⭐ ⭐ ⭐ ⭐ ⭐ 「社會運作的核心」\n直到 niche 真的「在可預見的未來有機會走某一個成功模式」\n才再花更多時間在上面\n不要只抓一件事\n「你光靠你跨領域的背景,你在某件事情上可能就可以做到很立體,而且很厲害」\n受訪者自己就是例子\n用「研究財報」的方法研究每個客戶\n在公司內部成為「解釋模型的高手」\n核心優勢:對社會的理解\n「文科生會更瞭解(社會)」\n理工科的人:\n但要走入社會、有影響力 :\n必須理解這個社會怎麼運作\n邏輯好\n情緒管理好\n做事穩定\n解決問題能力強\n真正的社會運作"}, {"num": 22, "title": "11 - 3 心理學的必要性 ⭐ ⭐ ⭐ ⭐", "stars": 5, "sections": [{"heading": "11 - 4 「專才 + 通才」 是正解 ⭐ ⭐ ⭐ ⭐ ⭐", "stars": 5, "blocks": [{"type": "paragraph", "text": "🎓 十二、 研究所要不要念 ? ⭐ ⭐ ⭐ ⭐"}]}, {"heading": "12 - 1 受訪者自身的故事 ⭐ ⭐ ⭐", "stars": 3, "blocks": [{"type": "quote", "text": "「這個社會運作的方式」包含:"}, {"type": "subhead", "text": "財團資本怎麼流動"}, {"type": "subhead", "text": "資本怎麼跟政策結合"}, {"type": "subhead", "text": "怎麼跟政治人物掛勾"}, {"type": "subhead", "text": "必須入是才有 impact"}, {"type": "quote", "text": "「你要入是你才有可能去讓你的產品有 impact」\n「才有可能去做出別人沒辦法做出來的解決方案」\n「我到現在還是非常認同,而且我越來越認同這件事情」"}, {"type": "subhead", "text": "理解決策者"}, {"type": "quote", "text": "「因為你要去理解那些在位階上的人怎麼做決策」\n「那些 stakeholder 怎麼做決策、他為什麼這樣做、他可能以後會怎麼做」"}, {"type": "subhead", "text": "完全認同 AI 的建議"}, {"type": "quote", "text": "「你要有一個核心的專業,也不見得要是你現在選的」\n「但是你終究得有一個核心的專業」\n「然後用你的專業去解決其他領域的問題」\n「這就是把你的價值最大化、把你的影響力最大化」"}, {"type": "subhead", "text": "2023 原本要去美國念碩士"}, {"type": "subhead", "text": "家人很支持"}]}], "plain": "11 - 3 心理學的必要性 ⭐ ⭐ ⭐ ⭐\n11 - 4 「專才 + 通才」 是正解 ⭐ ⭐ ⭐ ⭐ ⭐\n🎓 十二、 研究所要不要念 ? ⭐ ⭐ ⭐ ⭐\n12 - 1 受訪者自身的故事 ⭐ ⭐ ⭐\n「這個社會運作的方式」包含:\n財團資本怎麼流動\n資本怎麼跟政策結合\n怎麼跟政治人物掛勾\n必須入是才有 impact\n「你要入是你才有可能去讓你的產品有 impact」\n「才有可能去做出別人沒辦法做出來的解決方案」\n「我到現在還是非常認同,而且我越來越認同這件事情」\n理解決策者\n「因為你要去理解那些在位階上的人怎麼做決策」\n「那些 stakeholder 怎麼做決策、他為什麼這樣做、他可能以後會怎麼做」\n完全認同 AI 的建議\n「你要有一個核心的專業,也不見得要是你現在選的」\n「但是你終究得有一個核心的專業」\n「然後用你的專業去解決其他領域的問題」\n「這就是把你的價值最大化、把你的影響力最大化」\n2023 原本要去美國念碩士\n家人很支持"}, {"num": 23, "title": "12 d", "text": "但確認方向沒錯"}, {"type": "quote", "text": "「我再來一次,我還是會做一樣的事情」\n「不管是薪水待遇、眼界、解決問題的能力」\n「我都比蠻大一半的大學同學好」"}], "autofilled": true}, {"heading": "19 - 4 對自己定位的承認 ⭐ ⭐ ⭐", "stars": 3, "blocks": [{"type": "callout", "text": "這個格子是原筆記的章節標題。PDF 的內容接在同一頁的小節裡，下面已補入可閱讀的實際內容。"}, {"type": "list", "items": ["包含 / 對應小節: 🤝 二十、 家族脈絡與後續聯繫 ⭐ ⭐ ⭐"]}, {"type": "key", "text": "補入內容來源: 🤝 二十、 家族脈絡與後續聯繫 ⭐ ⭐ ⭐"}, {"type": "subhead", "text": "不要盲目相信決心"}, {"type": "quote", "text": "「決心跟有沒有辦法去做這些東西都要去驗證」\n「社會的變化要一直去觀察」\n「整個社會可能都長不一樣」"}, {"type": "callout", "text": "整場第八個核心金句"}, {"type": "quote", "text": "「絕對不要去脈絡化去討論一件事情」\n「一定要知道每件事情怎麼來的」\n「這都會幫助你決策」"}, {"type": "subhead", "text": "是不是成功人士?"}, {"type": "quote", "text": "「我不覺得」\n「但同齡來講,待遇是不錯,生活狀況也不錯,也比較自由」\n「我從來沒有把自己當成功人士」\n「我也不覺得我要變成成功人士」"}, {"type": "subhead", "text": "但確認方向沒錯"}, {"type": "quote", "text": "「我再來一次,我還是會做一樣的事情」\n「不管是薪水待遇、眼界、解決問題的能力」\n「我都比蠻大一半的大學同學好」"}], "autofilled": true}, {"heading": "🤝 二十、 家族脈絡與後續聯繫 ⭐ ⭐ ⭐", "stars": 3, "blocks": [{"type": "subhead", "text": "不要盲目相信決心"}, {"type": "quote", "text": "「決心跟有沒有辦法去做這些東西都要去驗證」\n「社會的變化要一直去觀察」\n「整個社會可能都長不一樣」"}, {"type": "callout", "text": "整場第八個核心金句"}, {"type": "quote", "text": "「絕對不要去脈絡化去討論一件事情」\n「一定要知道每件事情怎麼來的」\n「這都會幫助你決策」"}, {"type": "subhead", "text": "是不是成功人士?"}, {"type": "quote", "text": "「我不覺得」\n「但同齡來講,待遇是不錯,生活狀況也不錯,也比較自由」\n「我從來沒有把自己當成功人士」\n「我也不覺得我要變成成功人士」"}, {"type": "subhead", "text": "但確認方向沒錯"}, {"type": "quote", "text": "「我再來一次,我還是會做一樣的事情」\n「不管是薪水待遇、眼界、解決問題的能力」\n「我都比蠻大一半的大學同學好」"}, {"type": "subhead", "text": "不一樣的訪談關係"}]}], "plain": "19 - 2 但決心要被驗證 ⭐ ⭐ ⭐ ⭐\n19 - 3 ⭐ ⭐ ⭐ ⭐ ⭐ 脈絡很重要\n19 - 4 對自己定位的承認 ⭐ ⭐ ⭐\n🤝 二十、 家族脈絡與後續聯繫 ⭐ ⭐ ⭐\n不要盲目相信決心\n「決心跟有沒有辦法去做這些東西都要去驗證」\n「社會的變化要一直去觀察」\n「整個社會可能都長不一樣」\n整場第八個核心金句\n「絕對不要去脈絡化去討論一件事情」\n「一定要知道每件事情怎麼來的」\n「這都會幫助你決策」\n是不是成功人士?\n「我不覺得」\n「但同齡來講,待遇是不錯,生活狀況也不錯,也比較自由」\n「我從來沒有把自己當成功人士」\n「我也不覺得我要變成成功人士」\n但確認方向沒錯\n「我再來一次,我還是會做一樣的事情」\n「不管是薪水待遇、眼界、解決問題的能力」\n「我都比蠻大一半的大學同學好」\n不一樣的訪談關係"}, {"num": 32, "title": "🏆 最終的 10 句金句 ( 從整場挑出 )", "stars": 5, "sections": [{"heading": "📝 我的反思與啟發 ( 待填 )", "stars": 0, "blocks": [{"type": "subhead", "text": "受訪者是訪談者的表哥"}, {"type": "quote", "text": "「家族其實沒什麼人在做這件事情」\n「大家這個家族的人還是比較傳統」\n「如果能幫上忙,我都盡量幫」\n「還是不要有冤枉路,正常走了」"}, {"type": "subhead", "text": "與其他訪談的差別"}, {"type": "paragraph", "text": "這是長期可諮詢的窗口 ,而非一次性訪談"}, {"type": "callout", "text": "⭐ ⭐ ⭐ ⭐ ⭐ 整場最值得記住的話"}, {"type": "quote", "text": "1. 「把職涯想成投資 —— 你是用你的時間,去買進你的職涯這張股票。」\n2. 「我不是叫 AI 去想解決方法,我是想好解決方法叫 AI 去執行。」\n3. 「人累積過的東西永遠會在;如果你真的有累積到東西,永遠會在某個時刻發光,然後幫你一把。」\n4. 「最忌諱的事情是極端 —— 你完全相信 AI 跟你完全相信自己的基本功,都會有問題。」\n5. 「面試官根本不想看你的分數,是要看你能不能把分數化為理論、把理論化為實務。」\n6. 「你的決心比你念什麼科系重要多了。」\n7. 「絕對不要去脈絡化去討論一件事情,一定要知道每件事情怎麼來的。」\n8. 「看一個人有沒有料,就看他周遭最熟的 5 個人取個平均,大概就是他了。」\n9. 「你會的東西夠多、你夠了解這個社會的本質,至少不會落於人後。」\n10. 「就是要對自己誠實 —— 要更了解自己才能誠實。」"}, {"type": "subhead", "text": "訪談後反思"}, {"type": "subhead", "text": "受訪者最讓我意外的觀點是什麼?"}, {"type": "subhead", "text": "哪些建議我可以立刻開始做?"}, {"type": "paragraph", "text": "哪些觀點和我原本的想法相反?我為什麼會(或不會)改變想法?"}]}], "plain": "🏆 最終的 10 句金句 ( 從整場挑出 )\n📝 我的反思與啟發 ( 待填 )\n受訪者是訪談者的表哥\n「家族其實沒什麼人在做這件事情」\n「大家這個家族的人還是比較傳統」\n「如果能幫上忙,我都盡量幫」\n「還是不要有冤枉路,正常走了」\n與其他訪談的差別\n這是長期可諮詢的窗口 ,而非一次性訪談\n⭐ ⭐ ⭐ ⭐ ⭐ 整場最值得記住的話\n1. 「把職涯想成投資 —— 你是用你的時間,去買進你的職涯這張股票。」\n2. 「我不是叫 AI 去想解決方法,我是想好解決方法叫 AI 去執行。」\n3. 「人累積過的東西永遠會在;如果你真的有累積到東西,永遠會在某個時刻發光,然後幫你一把。」\n4. 「最忌諱的事情是極端 —— 你完全相信 AI 跟你完全相信自己的基本功,都會有問題。」\n5. 「面試官根本不想看你的分數,是要看你能不能把分數化為理論、把理論化為實務。」\n6. 「你的決心比你念什麼科系重要多了。」\n7. 「絕對不要去脈絡化去討論一件事情,一定要知道每件事情怎麼來的。」\n8. 「看一個人有沒有料,就看他周遭最熟的 5 個人取個平均,大概就是他了。」\n9. 「你會的東西夠多、你夠了解這個社會的本質,至少不會落於人後。」\n10. 「就是要對自己誠實 —— 要更了解自己才能誠實。」\n訪談後反思\n受訪者最讓我意外的觀點是什麼?\n哪些建議我可以立刻開始做?\n哪些觀點和我原本的想法相反?我為什麼會(或不會)改變想法?"}, {"num": 33, "title": "✅ 訪談後待辦", "stars": 0, "sections": [{"heading": "🔗 相關筆記", "stars": 0, "blocks": [{"type": "key", "text": "後續想再追問的問題:"}, {"type": "subhead", "text": "非洲創業的故事"}, {"type": "paragraph", "text": "數位內容學程的朋友(去美國遊戲業 UI/UX )"}, {"type": "subhead", "text": "完成訪談錄音整理(逐字稿)"}, {"type": "subhead", "text": "整理成詳細結構式大綱"}, {"type": "paragraph", "text": "加上重要度星等與色彩 callout"}, {"type": "subhead", "text": "寫成正式訪談報告(給課堂作業)"}, {"type": "subhead", "text": "寄感謝信給受訪者"}, {"type": "subhead", "text": "附上整理後的內容供受訪者確認"}, {"type": "key", "text": "後續聯繫:請受訪者引介他的數位內容學程畢業朋友"}, {"type": "subhead", "text": "找時間聽他講非洲創業的故事"}, {"type": "subhead", "text": "訪談 — 第一次訪談的大綱"}, {"type": "paragraph", "text": "Hermes/ 訪談 2 — 第二次訪談大綱(北科大法律通識教授)"}]}], "plain": "✅ 訪談後待辦\n🔗 相關筆記\n後續想再追問的問題:\n非洲創業的故事\n數位內容學程的朋友(去美國遊戲業 UI/UX )\n完成訪談錄音整理(逐字稿)\n整理成詳細結構式大綱\n加上重要度星等與色彩 callout\n寫成正式訪談報告(給課堂作業)\n寄感謝信給受訪者\n附上整理後的內容供受訪者確認\n後續聯繫:請受訪者引介他的數位內容學程畢業朋友\n找時間聽他講非洲創業的故事\n訪談 — 第一次訪談的大綱\nHermes/ 訪談 2 — 第二次訪談大綱(北科大法律通識教授)"}], "quotes": [{"page": 1, "text": "工作年資:訪談當天「剛好滿 5年」"}, {"page": 2, "text": "「我畢竟不是純 RD ,我不是真正的工程師」"}, {"page": 3, "text": "「有一個疑惑:怎麼把這些所學用在工作上?」"}, {"page": 3, "text": "「形容詞的話,當時是很迷惘,甚至有一點排斥的,稍微有點負面」"}, {"page": 3, "text": "負面: 「沒去事務所就是白唸」的偏見"}, {"page": 3, "text": "「沒有去過事務所的人,你就是白念」"}, {"page": 3, "text": "「沒有貢獻你該貢獻的所學」"}, {"page": 3, "text": "「沒有去過事務所的人會吃不了苦」"}, {"page": 3, "text": "「會計系的學生去事務所算是一個蠻糟糕的選擇」"}, {"page": 3, "text": "「對於外面世界的樣貌,我坦白說蠻不了解的」"}, {"page": 3, "text": "「我們其實畢業之後, 花蠻多時間評論這個老師的事」"}, {"page": 3, "text": "老師以為的狀況是「二三十年前的傳產或百業」"}, {"page": 3, "text": "「有些老師甚至是德高望重的老師,他們沒有與時俱進」"}, {"page": 4, "text": "「他可以有自信,可是我覺得他變成自傲」"}, {"page": 4, "text": "自傲的盲點: 「整個時代在推移,但是你卻沒有前進」"}, {"page": 4, "text": "「這是一個在業界跟在學校當老師很容易出現的 gap」"}, {"page": 4, "text": "「你是要去查企業的人,可是你收他錢」"}, {"page": 4, "text": "「這一點本身就是我一直不能理解的事情」"}, {"page": 4, "text": "在許多假帳案件中, 「應該要質疑企業的地方」 ,他們沒做"}, {"page": 4, "text": "「待遇或是影響力實在是太低落了」"}, {"page": 4, "text": "「10年前跟現在我們,尤其我們每一段時間都會拿出來比」"}, {"page": 4, "text": "業界「吃新公司上市潮」"}, {"page": 4, "text": "「當整個社會已經變得很成熟期,越來越少大型公司要上市的時候」"}, {"page": 4, "text": "「整個行業會變得可有可無」"}, {"page": 4, "text": "「你在這個局裡面你像是個局外人一樣」"}, {"page": 4, "text": "「先不講他會被 AI 取代這件事情,而且是很嚴重,他算是災區」"}, {"page": 4, "text": "「就算你是苦了 30年,你當上合夥人,一樣是沒什麼尊嚴」"}, {"page": 5, "text": "結果是「財務部門變成:重點放在精準表達過去發生的事件」"}, {"page": 5, "text": "「能不能用過去的數據去推測未來的劇本」"}, {"page": 5, "text": "但「台灣這塊做得非常、非常不夠」"}, {"page": 5, "text": "台灣 : 「會計這個學問在台灣決策中變得「可有可無」」"}, {"page": 5, "text": "不是「在事務所表現好」"}, {"page": 5, "text": "「你對社會、對學校或是對整個國家有沒有一些 impact」"}, {"page": 5, "text": "「你有沒有做出一些影響力」"}, {"page": 6, "text": "「主管給了很多自由 ,所以我並不是屬於那種走了會一直去罵那些人的人」"}, {"page": 6, "text": "「我也沒有在那邊開始準備, 我真的走的時候才開始準備」"}, {"page": 6, "text": "「沒有辦法說服自己我的工作有產生價值」"}, {"page": 6, "text": "「就是在照前人的程序再做東西, 你很少有可以設計的部分」"}, {"page": 6, "text": "「我覺得一直走下去,我不會比我周遭的人來的厲害」"}, {"page": 6, "text": "「當你覺得你在那個環境競爭不過其他人」"}, {"page": 6, "text": "⭐ 整場最重要的金句"}, {"page": 6, "text": "「你是用你的時間,去買進你的職涯這張股票。」"}, {"page": 7, "text": "「既然我要花我人生這麼多的時間,每天三分之一的時間,去投入一件事情」"}, {"page": 7, "text": "「我當然要研究說我在投入什麼」"}, {"page": 7, "text": "「你把自己想成一間公司,你有去調查」"}, {"page": 7, "text": "從「對數字敏感」找到方向"}, {"page": 7, "text": "3. 發現自己喜歡「看著資料說一個故事」"}, {"page": 7, "text": "4. 想做的事: 「解析數據,提供商業價值」"}, {"page": 7, "text": "「這個月的電表上去了,原因是什麼?我們把它拆開來看,發生什麼事情」"}, {"page": 7, "text": "→ 這就是「看資料說故事」的思維"}, {"page": 7, "text": "「我其實一開始就沒有想要往很 technical 的方向走」"}, {"page": 7, "text": "「到不是不喜歡,我還是有學那些程式」"}, {"page": 7, "text": "「分析公司 + 分析自己」"}, {"page": 8, "text": "「你必須去看那些業界的公司,然後去分析他們,然後去分析你自己,然後給你自己一個答案」"}, {"page": 8, "text": "GPU 適合做「一次很多重複的零到一運算」 → 拿來訓練 AI"}, {"page": 8, "text": "「那個時候其實離 ChatGPT 出來都還有 3年」"}, {"page": 8, "text": "「我那時候已經知道:原來 GPU 可以拿來訓練 AI 是這麼回事」"}, {"page": 8, "text": "「只是後來沒有人想到語言模型會那麼快跑出來」"}, {"page": 8, "text": "「所以說當時看不到嗎?當時其實看得到」"}, {"page": 8, "text": "「怎麼樣你可以看的到?把你的職涯想成一個投資」"}, {"page": 9, "text": "「跟你會不會、你的生活受影響嗎?我覺得這是綁在一 ..."}, {"page": 9, "text": "「甚至你可以再乘開:你的才能在你喜歡的東西上,但這個東西賺不賺錢」"}, {"page": 9, "text": "學完每一門課, 「回頭好好回想一下」 :"}, {"page": 9, "text": "「成就感如果來自於分數,那不用拿來評比這件事情」"}, {"page": 9, "text": "「我學這個東西有沒有興奮」"}, {"page": 10, "text": "「我學這個東西有沒有很拿手」"}, {"page": 10, "text": "整場另一個核心金句"}, {"page": 10, "text": "「你的心情是騙不了人的」"}, {"page": 10, "text": "「尤其因為你投資很多時間在念書」"}, {"page": 10, "text": "「你有花很多時間下去的東西,你的心情是騙不了你的」"}, {"page": 10, "text": "「我當年沒有人問,所以我很晚很晚才開始想這件事情」"}, {"page": 10, "text": "「所以如果今天有一個人才大一大二,我會想跟他說什麼,我就是會想這樣講」"}, {"page": 10, "text": "「會計這個東西,你要會的程度,出社會補就好了」"}, {"page": 10, "text": "「我覺得是我出社會後會重新拿回來看的東西」"}, {"page": 10, "text": "但要避免成為「總經魔人」"}, {"page": 11, "text": "「很多經濟學家會變成總經魔人,他會變成拿那些數據解釋到走火入魔」"}, {"page": 11, "text": "「那樣就是另一種那種老師而已」"}, {"page": 11, "text": "「因為你會需要去了解這個社會大家的需求、大家的情緒」"}, {"page": 11, "text": "「統計可能以後沒有那麼重要,因為都可以交給 AI 跑」"}, {"page": 11, "text": "「但是還是可以解讀一下統計」"}, {"page": 11, "text": "「那當然那個你一定會去念啦」"}, {"page": 11, "text": "「技術要有商業價值,不然他沒有用」"}, {"page": 11, "text": "「一個好的工程師或好的科技業員工」"}, {"page": 11, "text": "「如果你想要有影響力之後當產品經理或高階主管」"}, {"page": 11, "text": "「你要意識到是技術要有商業價值」"}, {"page": 11, "text": "例外: 「除非你想要一輩子做科學研究」"}, {"page": 12, "text": "「如果你是想要當一個 builder ,你想要蓋東西」"}, {"page": 12, "text": "「你想要蓋一個有用的東西」"}, {"page": 12, "text": "「必須去瞭解這個世界的脈絡跟他的需求」"}, {"page": 12, "text": "受訪者支持「犧牲成績去玩 AI」"}, {"page": 12, "text": "「雖然我這樣講很不負責任,但其實我聽到蠻開心的」"}, {"page": 12, "text": "「平衡的方式不是說把成績拉起來」"}, {"page": 12, "text": "「平衡的方式是去學你做這個興趣、蓋這些東西的路上你會需要的知識」"}, {"page": 12, "text": "「這個是一個很好的問題,但我從來沒有這樣想過,這真的是完全沒有」"}, {"page": 12, "text": "「當你做了真正想做的事, 前面走的就叫繞路」"}, {"page": 12, "text": "「他不會讓你覺得,因為他已經是沉沒成本了」"}, {"page": 12, "text": "但是:美國 CP A 「到現在根本沒用過」"}, {"page": 12, "text": "「會計系給我的邏輯還是在」"}, {"page": 12, "text": "「對數字的敏感度是絕對沒有問題的」"}, {"page": 12, "text": "「絕對有給我紮實的訓練」"}, {"page": 12, "text": "「或許可能只用到 20%–30%」"}, {"page": 13, "text": "整場第三個核心金句"}, {"page": 13, "text": "「我 20 幾歲的時候沒有那麼理解」"}, {"page": 13, "text": "「等到 30 歲的時候我知道 —— 其實你累積過的東西永遠會在」"}, {"page": 13, "text": "「如果你真的有累積到東西,永遠會在某個時刻發光,然後他會幫你一把」"}, {"page": 13, "text": "「尤其像星澄你的學習能力這麼好,你的這種機會會更多」"}, {"page": 13, "text": "我們已經不是「一家公司待到退休」的世代"}, {"page": 13, "text": "「我連我都不是我爸媽那個世代能夠一間公司待到最後」"}, {"page": 13, "text": "「我們現在就是什麼鬼東西都要會」"}, {"page": 13, "text": "「我不覺得 5年後我還會繼續待在這一行」"}, {"page": 13, "text": "「尤其在 AI 時代,我覺得沒有人有任何保證」"}, {"page": 13, "text": "「你會越多技能,你有越多彈性」"}, {"page": 13, "text": "「越能夠去判斷這個社會現在需要什麼跟我要怎麼去避險」"}, {"page": 13, "text": "「我們在解釋模型的時候,我們都會比純工程師厲害」"}, {"page": 13, "text": "用「研究公司」的方法分析每個客戶"}, {"page": 14, "text": "老闆 /HR 看到「會計系」會皺眉怎麼辦?"}, {"page": 14, "text": "「就算你沒辦法說服自己,你還是得把你的故事寫成像點點線連在一起」"}, {"page": 14, "text": "「這個我也會,那個我也會,為什麼我會?因為我要去做某件事」"}, {"page": 14, "text": "沒補起來:用「Roadmap」說故事"}, {"page": 14, "text": "「最初期粗糙產品」策略"}, {"page": 14, "text": "「雖然你還不會某個技能,但是你可以先做一個最初期粗糙的產品出來」"}, {"page": 15, "text": "核心金句"}, {"page": 15, "text": "「做資料這一行,邏輯永遠是比所有其他的東西更重要的東西」"}, {"page": 15, "text": "「你選了一條 90% 你系上的人根本不會去做的事情」"}, {"page": 15, "text": "「沒有人可以給你意見,除了真的走過這條路的人之外」"}, {"page": 15, "text": "「有時候你會覺得很孤獨」"}, {"page": 15, "text": "「你的職涯有 30年,你是忍不了那麼久的」"}, {"page": 15, "text": "同屆財管系到現在「去科技業做非財務工作的人不到 10%」"}, {"page": 15, "text": "「根本沒人在做(大數據) ,就一兩個啦」"}, {"page": 15, "text": "整場第四個核心金句"}, {"page": 15, "text": "「人只要對自己誠實就好」"}, {"page": 15, "text": "「就是要更了解自己才能誠實」"}, {"page": 16, "text": "「你很容易對自己喜歡的事情也會有幻覺」"}, {"page": 16, "text": "以為「我以為我討厭會計」"}, {"page": 16, "text": "結果「10年後發現,我比我想的還討厭會計」"}, {"page": 16, "text": "「通常一個人離開一個討厭的地方之後,你會雲淡風輕」"}, {"page": 16, "text": "「但是當你很客觀、不帶情緒去想這件事」"}, {"page": 16, "text": "「然後還發現說:哇我比我想的還討厭,那其實真的是討厭的」"}, {"page": 16, "text": "整場最強的「悔恨型建議」"}, {"page": 16, "text": "「我最後悔的就是沒有多做實習」"}, {"page": 16, "text": "「如果要做,一定要多做實習」"}, {"page": 16, "text": "「完全不是為了履歷好看而已」"}, {"page": 17, "text": "「你多做實習才知道(業界)幹嘛」"}, {"page": 17, "text": "「了解現實工作在幹嘛之後」"}, {"page": 17, "text": "「你就更知道你要下什麼去解決什麼問題」"}, {"page": 17, "text": "「不知道他要打造什麼東西」"}, {"page": 17, "text": "「不知道他用 AI 要幹嘛」"}, {"page": 17, "text": "「原本就有很多想要執行的東西」"}, {"page": 17, "text": "「可是他沒有時間,或者是他沒有執行力」"}, {"page": 17, "text": "「這人在 AI 時代很明顯」"}, {"page": 17, "text": "「有些人他缺的是生產力,他不缺邏輯」"}, {"page": 17, "text": "整場第五個核心金句"}, {"page": 17, "text": "「我不是叫 AI 去想解決方法,我是想好解決方法叫 AI 去執行」"}, {"page": 17, "text": "「重點是你去給他號令」"}, {"page": 18, "text": "「邏輯是你要知道你要什麼東西,然後你去打造他」"}, {"page": 18, "text": "「沒有辦法去 picture、沒有辦法去把這些東西視覺化在自己腦海中的人,就是第一個被淘汰的」"}, {"page": 18, "text": "「整個社會上多的是根本連 ChatGPT 都不會用的人」"}, {"page": 18, "text": "「甚至只是跟她聊天的人」"}, {"page": 18, "text": "「你以為的整個社會已經 AI 化了,但其實大多數人就是過他們的生活」"}, {"page": 18, "text": "大學 4年 / 研究所 2年都不用 AI → 想打造「硬實力」"}, {"page": 18, "text": "「再早個 5年,我可能可以認同」"}, {"page": 18, "text": "現在: 「這就是屬於缺乏社會敏感度」"}, {"page": 18, "text": "「只追求技術,但忽略了這個世界需要的技術是因為她有需求」"}, {"page": 18, "text": "「他停留在『人家給他問題,他去解決』」"}, {"page": 18, "text": "「而不是有一個更大方向的需求,然後你設計出問題、你去解決」"}, {"page": 18, "text": "結果: 「這個人的影響力就是 1 顆螺絲釘」"}, {"page": 19, "text": "「社會最忌諱的事情是極端」"}, {"page": 19, "text": "「你完全相信 AI ,跟你完全相信自己的基本功,都會有問題」"}, {"page": 19, "text": "「0 跟 100 都是不對的」"}, {"page": 19, "text": "「最佳解可能在 30、可能在 75」"}, {"page": 19, "text": "「這就是你要透過實驗去驗證」"}, {"page": 19, "text": "「AI 是表象,資料邏輯是根本」"}, {"page": 19, "text": "「這張表格要長怎樣、資料庫到底要長怎樣」"}, {"page": 19, "text": "「這東西其實是先於 AI」"}, {"page": 19, "text": "「你要先會這個東西才能去談」"}, {"page": 19, "text": "「AI 只是讓實作這一塊變得容易」"}, {"page": 19, "text": "「你要去多方涉獵這些數據代表什麼」"}, {"page": 19, "text": "「因為這就是這個社會的模樣」"}, {"page": 19, "text": "「這個社會也代表著他需要什麼樣的人」"}, {"page": 19, "text": "「那就代表著會開出什麼樣的職缺」"}, {"page": 20, "text": "「我們怎麼樣不被 AI 取代?」"}, {"page": 20, "text": "「我不是叫 AI 去想解決方法,我是想好解決方法叫 AI 去執行」"}, {"page": 20, "text": "我做的「奇怪小東西」會不會其實是趨勢?"}, {"page": 20, "text": "「核心價值是讓一個獨特的領域有價值」"}, {"page": 20, "text": "「不要 all in ,像投資一樣」"}, {"page": 21, "text": "📖 十一、 商科生在 A I 時代的 「文科優勢」 ⭐ ⭐ ⭐ ⭐"}, {"page": 21, "text": "直到 niche 真的「在可預見的未來有機會走某一個成功模式」"}, {"page": 21, "text": "「你光靠你跨領域的背景,你在某件事情上可能就可以做到很立體,而且很厲害」"}, {"page": 21, "text": "用「研究財報」的方法研究每個客戶"}, {"page": 21, "text": "在公司內部成為「解釋模型的高手」"}, {"page": 21, "text": "「文科生會更瞭解(社會)」"}, {"page": 22, "text": "「這個社會運作的方式」包含:"}, {"page": 22, "text": "「你要入是你才有可能去讓你的產品有 impact」"}, {"page": 22, "text": "「才有可能去做出別人沒辦法做出來的解決方案」"}, {"page": 22, "text": "「我到現在還是非常認同,而且我越來越認同這件事情」"}, {"page": 22, "text": "「因為你要去理解那些在位階上的人怎麼做決策」"}, {"page": 22, "text": "「那些 stakeholder 怎麼做決策、他為什麼這樣做、他可能以後會怎麼做」"}, {"page": 22, "text": "「你要有一個核心的專業,也不見得要是你現在選的」"}, {"page": 22, "text": "「但是你終究得有一個核心的專業」"}, {"page": 22, "text": "「然後用你的專業去解決其他領域的問題」"}, {"page": 22, "text": "「這就是把你的價值最大化、把你的影響力最大化」"}, {"page": 23, "text": "「AI 感覺要把這個職位相關要會的東西都扼殺掉了」"}, {"page": 23, "text": "「很多是大學教授很知名的大學教授出來開的課」"}, {"page": 23, "text": "「上完還可以在履歷上有一個證書」"}, {"page": 23, "text": "「你花個五六百萬,其實沒啥意義」"}, {"page": 23, "text": "不如「兩三年不工作,拿那五六百萬的機會成本好好的把一些東西學起來」"}, {"page": 23, "text": "「還比你出國唸書有用」"}, {"page": 23, "text": "「進台積電這種明確需要碩士的目標 → 直接念,不用想」"}, {"page": 23, "text": "「因為有些東西是明確的,有些東西不是」"}, {"page": 23, "text": "「AI 讓很多領域的所謂原本專精的領域變得也沒有那麼專精了」"}, {"page": 24, "text": "「如果我需要我就是會去念」"}, {"page": 24, "text": "「人就是要跟著時代去走」"}, {"page": 24, "text": "「你要學一個理論變得更容易」"}, {"page": 24, "text": "「你去念到一個學歷,他的護城河也變弱了」"}, {"page": 24, "text": "「不是不去念書,而是要更謹慎」"}, {"page": 24, "text": "「因為我現在在 train AI 取代我」"}, {"page": 24, "text": "「但是我自己有開公司,現在在非洲」"}, {"page": 24, "text": "「也是運用我當年在會計系學的東西,那些我真正想用的東西」"}, {"page": 24, "text": "「你未來在某個時間點,可能會用很怪異的方式,把你曾經學到的東西全部連在一起」"}, {"page": 25, "text": "「技多不壓身」的具體價值"}, {"page": 25, "text": "3. 「某一個很 niche 的能力,在未來你用到」"}, {"page": 25, "text": "4. 或者「因為你用那個能力認識某些人,然後有某些機會讓你去驗證」"}, {"page": 25, "text": "「這個東西的本質:你有理念但是缺執行力的人會有優勢」"}, {"page": 25, "text": "「我明確知道我要幹嘛」"}, {"page": 25, "text": "「我只是要叫你( AI )去做」"}, {"page": 25, "text": "「我反而是會得利的人」"}, {"page": 25, "text": "「現在的學生出社會還沒有累積到資本」"}, {"page": 25, "text": "「但是 AI 的資源跟晉升機會可能都掌握在已經卡好位、有資本的人身上」"}, {"page": 25, "text": "「我對未來是比較悲觀的」"}, {"page": 25, "text": "「你會的東西夠多、你夠了解這個社會的本質」"}, {"page": 25, "text": "「你會是更好做出高品質決策的人」"}, {"page": 25, "text": "核心金句"}, {"page": 26, "text": "「每一件事情、每一個危機出來,你都要去瞭解它的本質」"}, {"page": 26, "text": "「然後去瞭解誰會活下來、誰不會活下來」"}, {"page": 26, "text": "「事情出來的時候,大家都在恐慌、都在情緒」"}, {"page": 26, "text": "「你不要去聽那些人講話,稍微聽一下就好」"}, {"page": 26, "text": "「你自己去分析到底事情的本質是什麼」"}, {"page": 26, "text": "「你學越多東西,你就越不會被騙」"}, {"page": 26, "text": "「你也不會被情緒帶著走」"}, {"page": 26, "text": "「你越可以去挖掘出事情的本質」"}, {"page": 26, "text": "「跨領域的優勢就是你會更好的去解讀這個世界上的所有事情」"}, {"page": 26, "text": "20 幾歲 「人脈不是那麼重要」"}, {"page": 26, "text": "30 幾歲 「個人單打獨鬥是不夠的」"}, {"page": 27, "text": "「沒有一定要逼自己參與系上活動」"}, {"page": 27, "text": "「但還是要有一些系上的知心朋友」"}, {"page": 27, "text": "「真的覺得這個人未來可以幫得上你的忙的朋友」"}, {"page": 27, "text": "「看一個人的有沒有料,就看他周遭最熟的 5 個人取個平均,大概就是他了」"}, {"page": 27, "text": "對供需理論「眼睛亮了一樣」"}, {"page": 27, "text": "「試著拿你學到的理論,在生活上給自己一個命題去驗證」"}, {"page": 28, "text": "整場第六個核心金句"}, {"page": 28, "text": "「面試官根本不想看你的分數」"}, {"page": 28, "text": "「能不能把分數化為理論,從理論化為實務」"}, {"page": 28, "text": "「這個才是他們想要看到的人才」"}, {"page": 28, "text": "4. 「你才有辦法把一個東西玩到很通」"}, {"page": 28, "text": "「分數高不高不是那麼重要」"}, {"page": 28, "text": "「出社會一點都不重要」"}, {"page": 28, "text": "「找到第一份工作的時候就不重要」"}, {"page": 29, "text": "「政大人跟台大人的臨門一腳,就是政大人太過保守了」"}, {"page": 29, "text": "「很多東西其實在大學的時候就可以走」"}, {"page": 29, "text": "「我感覺你以我認識的政大人來講,你算是超級清新」"}, {"page": 29, "text": "「你基本上你有這種心態,你在台大、政大都一樣」"}, {"page": 29, "text": "「今天如果重來,我一定也會給你這些意見」"}, {"page": 29, "text": "「你的邏輯是對的,你的價值觀是對的」"}, {"page": 29, "text": "「我覺得這是一個蠻值得你花時間的地方」"}, {"page": 29, "text": "「還有很多年,一定會有很多自我懷疑」"}, {"page": 30, "text": "「政大學生很努力,但跟台大學生比有一個問題 :"}, {"page": 30, "text": "校風保守,大家比較不敢做跳脫思維的事」"}, {"page": 30, "text": "「整個會計系還是被余老師那個價值觀」"}, {"page": 30, "text": "「還是很多人覺得『瘋狂把會計系念好,去做相關的工作做一做』」"}, {"page": 30, "text": "「再想要怎麼辦,那是其實有點來不及了」"}, {"page": 30, "text": "「你大一就在做這件事情(訪談跨領域者)」"}, {"page": 30, "text": "「我覺得超棒的、就蠻厲害的」"}, {"page": 30, "text": "「你已經看透蠻多事情的本質」"}, {"page": 30, "text": "「我一點也不擔心你的未來」"}, {"page": 30, "text": "「你一定會修正到你想去的地方」"}, {"page": 30, "text": "整場第七個核心金句"}, {"page": 30, "text": "「你的決心比你念什麼科系重要多了」"}, {"page": 30, "text": "「現在又不是什麼三四十年前」"}, {"page": 30, "text": "「你真的想做什麼東西,你的決心比你念什麼科系重要多了」"}, {"page": 31, "text": "「決心跟有沒有辦法去做這些東西都要去驗證」"}, {"page": 31, "text": "「社會的變化要一直去觀察」"}, {"page": 31, "text": "「整個社會可能都長不一樣」"}, {"page": 31, "text": "整場第八個核心金句"}, {"page": 31, "text": "「絕對不要去脈絡化去討論一件事情」"}, {"page": 31, "text": "「一定要知道每件事情怎麼來的」"}, {"page": 31, "text": "「但同齡來講,待遇是不錯,生活狀況也不錯,也比較自由」"}, {"page": 31, "text": "「我從來沒有把自己當成功人士」"}, {"page": 31, "text": "「我也不覺得我要變成成功人士」"}, {"page": 31, "text": "「我再來一次,我還是會做一樣的事情」"}, {"page": 31, "text": "「不管是薪水待遇、眼界、解決問題的能力」"}, {"page": 31, "text": "「我都比蠻大一半的大學同學好」"}, {"page": 32, "text": "「家族其實沒什麼人在做這件事情」"}, {"page": 32, "text": "「大家這個家族的人還是比較傳統」"}, {"page": 32, "text": "「如果能幫上忙,我都盡量幫」"}, {"page": 32, "text": "「還是不要有冤枉路,正常走了」"}, {"page": 32, "text": "1. 「把職涯想成投資 —— 你是用你的時間,去買進你的職涯這張股票。」"}, {"page": 32, "text": "2. 「我不是叫 AI 去想解決方法,我是想好解決方法叫 AI 去執行。」"}, {"page": 32, "text": "3. 「人累積過的東西永遠會在;如果你真的有累積到東西,永遠會在某個時刻發光,然後幫你一把。」"}, {"page": 32, "text": "4. 「最忌諱的事情是極端 —— 你完全相信 AI 跟你完全相信自己的基本功,都會有問題。」"}, {"page": 32, "text": "5. 「面試官根本不想看你的分數,是要看你能不能把分數化為理論、把理論化為實務。」"}, {"page": 32, "text": "6. 「你的決心比你念什麼科系重要多了。」"}, {"page": 32, "text": "7. 「絕對不要去脈絡化去討論一件事情,一定要知道每件事情怎麼來的。」"}, {"page": 32, "text": "8. 「看一個人有沒有料,就看他周遭最熟的 5 個人取個平均,大概就是他了。」"}, {"page": 32, "text": "9. 「你會的東西夠多、你夠了解這個社會的本質,至少不會落於人後。」"}, {"page": 32, "text": "10. 「就是要對自己誠實 —— 要更了解自己才能誠實。」"}]}</script><script>
const data=JSON.parse(document.getElementById('data').textContent);let current=1,starFilter=0,expanded=false;const openChapters=new Set();const nav=document.getElementById('nav'),content=document.getElementById('content'),quotes=document.getElementById('quotes'),search=document.getElementById('search');const esc=s=>String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));const cleanNavTitle=s=>String(s).replace(/(?:\s*⭐)+\s*$/,'').trim();const maxStars=p=>Math.max(p.stars||0,...p.sections.map(s=>s.stars||0));function pass(p){const q=search.value.trim().toLowerCase();if(starFilter&&maxStars(p)<starFilter)return false;if(!q)return true;return p.plain.toLowerCase().includes(q)}function chapterTitle(p){const lines=(p.plain||p.title||'').split('\n');const hit=lines.find(l=>/^[^\d\n]{0,6}[一二三四五六七八九十]+、/.test(l));return hit?cleanNavTitle(hit):null}function groupedPages(){let groups=[],g=null;data.pages.forEach(p=>{const title=chapterTitle(p);if(title||!g){g={title:title||'訪談開場',pages:[]};groups.push(g)}g.pages.push(p)});return groups}function pageButton(p){const b=document.createElement('button');b.className='navPage'+(p.num===current?' active':'');b.innerHTML=`<div class="navNum">${String(p.num).padStart(2,'0')}</div><div class="navTitle">${esc(cleanNavTitle(p.title))}</div><div class="navStars" aria-label="星等">${'⭐'.repeat(Math.min(5,Math.max(1,maxStars(p))))}</div>`;b.onclick=()=>{current=p.num;render()};return b}function renderNav(){nav.innerHTML='';let any=false;const q=search.value.trim();groupedPages().forEach((g,idx)=>{const pages=g.pages.filter(pass);if(!pages.length)return;any=true;const id=`${idx}-${g.title}`;const active=pages.some(p=>p.num===current);const open=q||active||openChapters.has(id);const wrap=document.createElement('div');wrap.className='chapterGroup'+(open?'':' closed');const btn=document.createElement('button');btn.className='chapterBtn';btn.innerHTML=`<span>${esc(g.title)}<small>${String(pages[0].num).padStart(2,'0')} - ${String(pages[pages.length-1].num).padStart(2,'0')} / ${pages.length} 頁</small></span><span>${open?'−':'+'}</span>`;btn.onclick=()=>{if(openChapters.has(id))openChapters.delete(id);else openChapters.add(id);renderNav()};const list=document.createElement('div');list.className='chapterPages';pages.forEach(p=>list.appendChild(pageButton(p)));wrap.appendChild(btn);wrap.appendChild(list);nav.appendChild(wrap)});if(!any)nav.innerHTML='<div class="empty">沒有符合條件的頁面</div>'}function blockHtml(b){if(b.type==='quote')return `<blockquote class="quoteBlock">${b.text.split('\n').map(x=>`<p>${esc(x)}</p>`).join('')}</blockquote>`;if(b.type==='list')return `<ul class="noteList">${b.items.map(x=>`<li>${esc(x)}</li>`).join('')}</ul>`;if(b.type==='callout')return `<div class="callout">${esc(b.text)}</div>`;if(b.type==='key')return `<div class="key">${esc(b.text)}</div>`;if(b.type==='subhead')return `<div class="note-subhead">${esc(b.text)}</div>`;return `<p class="para">${esc(b.text)}</p>`}function renderContent(){const p=data.pages.find(x=>x.num===current)||data.pages.find(pass)||data.pages[0];current=p.num;const secs=p.sections.map((s,i)=>`<article class="section ${expanded||i===0?'open':''}"><button class="sectionBtn"><span>${esc(s.heading)}</span><span>${s.stars?'⭐'.repeat(Math.min(5,s.stars)):''} ＋</span></button><div class="sectionBody">${s.blocks.map(blockHtml).join('')}</div></article>`).join('');content.innerHTML=`<section class="panel pageHead"><div class="pageNo">${String(p.num).padStart(2,'0')}</div><div><div class="label">原 PDF 第 ${p.num} 頁</div><h2>${esc(p.title)}</h2><p>這一頁保留原筆記順序，並用段落、引用框、重點框重新排版，讓它讀起來更像完整的 Obsidian 筆記。</p></div></section><section class="panel"><div class="label">筆記式閱讀</div>${secs}<details><summary class="sectionBtn" style="border:3px solid var(--ink);background:var(--cyan);margin-top:18px;">查看本頁原始抽取文字</summary><div class="sectionBody" style="display:block"><div class="raw">${esc(p.plain)}</div></div></details></section>`;content.querySelectorAll('.sectionBtn').forEach(btn=>btn.onclick=()=>btn.parentElement.classList.toggle('open'))}function renderQuotes(){const q=search.value.trim().toLowerCase();quotes.innerHTML='';data.quotes.filter(x=>!q||x.text.toLowerCase().includes(q)).slice(0,140).forEach(x=>{const d=document.createElement('div');d.className='quote';d.innerHTML=`<small>PAGE ${String(x.page).padStart(2,'0')}</small><p>${esc(x.text)}</p>`;d.onclick=()=>{current=x.page;render()};quotes.appendChild(d)});if(!quotes.children.length)quotes.innerHTML='<div class="empty">沒有符合搜尋的金句</div>'}function render(){renderNav();renderContent();renderQuotes()}document.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));c.classList.add('on');starFilter=Number(c.dataset.star);render()});search.oninput=render;document.getElementById('expandAll').onclick=()=>{expanded=!expanded;document.getElementById('expandAll').textContent=expanded?'全部收合':'全部展開';renderContent()};document.getElementById('pageCount').textContent=data.pages.length;document.getElementById('sectionCount').textContent=data.pages.reduce((a,p)=>a+p.sections.length,0);document.getElementById('quoteCount').textContent=data.quotes.length;render();
</script></body></html>
