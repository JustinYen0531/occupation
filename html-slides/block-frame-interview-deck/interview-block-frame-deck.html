,{"page":13,"text":"「如果你真的有累積到東西,永遠會在某個時刻發光,然後他會幫你一把」"},{"page":13,"text":"「尤其像星澄你的學習能力這麼好,你的這種機會會更多」"},{"page":13,"text":"我們已經不是「一家公司待到退休」的世代"},{"page":13,"text":"「我連我都不是我爸媽那個世代能夠一間公司待到最後」"},{"page":13,"text":"「我們現在就是什麼鬼東西都要會」"},{"page":13,"text":"「我不覺得 5年後我還會繼續待在這一行」"},{"page":13,"text":"「尤其在 AI 時代,我覺得沒有人有任何保證」"},{"page":13,"text":"「你會越多技能,你有越多彈性」"},{"page":13,"text":"「越能夠去判斷這個社會現在需要什麼跟我要怎麼去避險」"},{"page":13,"text":"「我們在解釋模型的時候,我們都會比純工程師厲害」"},{"page":13,"text":"用「研究公司」的方法分析每個客戶"},{"page":14,"text":"老闆 /HR 看到「會計系」會皺眉怎麼辦?"},{"page":14,"text":"「就算你沒辦法說服自己,你還是得把你的故事寫成像點點線連在一起」"},{"page":14,"text":"「這個我也會,那個我也會,為什麼我會?因為我要去做某件事」"},{"page":14,"text":"沒補起來:用「Roadmap」說故事"},{"page":14,"text":"「最初期粗糙產品」策略"},{"page":14,"text":"「雖然你還不會某個技能,但是你可以先做一個最初期粗糙的產品出來」"},{"page":15,"text":"核心金句"},{"page":15,"text":"「做資料這一行,邏輯永遠是比所有其他的東西更重要的東西」"},{"page":15,"text":"「你選了一條 90% 你系上的人根本不會去做的事情」"},{"page":15,"text":"「沒有人可以給你意見,除了真的走過這條路的人之外」"},{"page":15,"text":"「有時候你會覺得很孤獨」"},{"page":15,"text":"「你的職涯有 30年,你是忍不了那麼久的」"},{"page":15,"text":"同屆財管系到現在「去科技業做非財務工作的人不到 10%」"},{"page":15,"text":"「根本沒人在做(大數據) ,就一兩個啦」"},{"page":15,"text":"整場第四個核心金句"},{"page":15,"text":"「人只要對自己誠實就好」"},{"page":15,"text":"「就是要更了解自己才能誠實」"},{"page":16,"text":"「你很容易對自己喜歡的事情也會有幻覺」"},{"page":16,"text":"以為「我以為我討厭會計」"},{"page":16,"text":"結果「10年後發現,我比我想的還討厭會計」"},{"page":16,"text":"「通常一個人離開一個討厭的地方之後,你會雲淡風輕」"},{"page":16,"text":"「但是當你很客觀、不帶情緒去想這件事」"},{"page":16,"text":"「然後還發現說:哇我比我想的還討厭,那其實真的是討厭的」"},{"page":16,"text":"整場最強的「悔恨型建議」"},{"page":16,"text":"「我最後悔的就是沒有多做實習」"},{"page":16,"text":"「如果要做,一定要多做實習」"},{"page":16,"text":"「完全不是為了履歷好看而已」"},{"page":17,"text":"「你多做實習才知道(業界)幹嘛」"},{"page":17,"text":"「了解現實工作在幹嘛之後」"},{"page":17,"text":"「你就更知道你要下什麼去解決什麼問題」"},{"page":17,"text":"「不知道他要打造什麼東西」"},{"page":17,"text":"「不知道他用 AI 要幹嘛」"},{"page":17,"text":"「原本就有很多想要執行的東西」"},{"page":17,"text":"「可是他沒有時間,或者是他沒有執行力」"},{"page":17,"text":"「這人在 AI 時代很明顯」"},{"page":17,"text":"「有些人他缺的是生產力,他不缺邏輯」"},{"page":17,"text":"整場第五個核心金句"},{"page":17,"text":"「我不是叫 AI 去想解決方法,我是想好解決方法叫 AI 去執行」"},{"page":17,"text":"「重點是你去給他號令」"},{"page":18,"text":"「邏輯是你要知道你要什麼東西,然後你去打造他」"},{"page":18,"text":"「沒有辦法去 picture、沒有辦法去把這些東西視覺化在自己腦海中的人,就是第一個被淘汰的」"},{"page":18,"text":"「整個社會上多的是根本連 ChatGPT 都不會用的人」"},{"page":18,"text":"「甚至只是跟她聊天的人」"},{"page":18,"text":"「你以為的整個社會已經 AI 化了,但其實大多數人就是過他們的生活」"},{"page":18,"text":"大學 4年 / 研究所 2年都不用 AI → 想打造「硬實力」"},{"page":18,"text":"「再早個 5年,我可能可以認同」"},{"page":18,"text":"現在: 「這就是屬於缺乏社會敏感度」"},{"page":18,"text":"「只追求技術,但忽略了這個世界需要的技術是因為她有需求」"},{"page":18,"text":"「他停留在『人家給他問題,他去解決』」"},{"page":18,"text":"「而不是有一個更大方向的需求,然後你設計出問題、你去解決」"},{"page":18,"text":"結果: 「這個人的影響力就是 1 顆螺絲釘」"},{"page":19,"text":"「社會最忌諱的事情是極端」"},{"page":19,"text":"「你完全相信 AI ,跟你完全相信自己的基本功,都會有問題」"},{"page":19,"text":"「0 跟 100 都是不對的」"},{"page":19,"text":"「最佳解可能在 30、可能在 75」"},{"page":19,"text":"「這就是你要透過實驗去驗證」"},{"page":19,"text":"「AI 是表象,資料邏輯是根本」"},{"page":19,"text":"「這張表格要長怎樣、資料庫到底要長怎樣」"},{"page":19,"text":"「這東西其實是先於 AI」"},{"page":19,"text":"「你要先會這個東西才能去談」"},{"page":19,"text":"「AI 只是讓實作這一塊變得容易」"},{"page":19,"text":"「你要去多方涉獵這些數據代表什麼」"},{"page":19,"text":"「因為這就是這個社會的模樣」"},{"page":19,"text":"「這個社會也代表著他需要什麼樣的人」"},{"page":19,"text":"「那就代表著會開出什麼樣的職缺」"},{"page":20,"text":"「我們怎麼樣不被 AI 取代?」"},{"page":20,"text":"「我不是叫 AI 去想解決方法,我是想好解決方法叫 AI 去執行」"},{"page":20,"text":"我做的「奇怪小東西」會不會其實是趨勢?"},{"page":20,"text":"「核心價值是讓一個獨特的領域有價值」"},{"page":20,"text":"「不要 all in ,像投資一樣」"},{"page":21,"text":"📖 十一、 商科生在 A I 時代的 「文科優勢」 ⭐ ⭐ ⭐ ⭐"},{"page":21,"text":"直到 niche 真的「在可預見的未來有機會走某一個成功模式」"},{"page":21,"text":"「你光靠你跨領域的背景,你在某件事情上可能就可以做到很立體,而且很厲害」"},{"page":21,"text":"用「研究財報」的方法研究每個客戶"},{"page":21,"text":"在公司內部成為「解釋模型的高手」"},{"page":21,"text":"「文科生會更瞭解(社會)」"},{"page":22,"text":"「這個社會運作的方式」包含:"},{"page":22,"text":"「你要入是你才有可能去讓你的產品有 impact」"},{"page":22,"text":"「才有可能去做出別人沒辦法做出來的解決方案」"},{"page":22,"text":"「我到現在還是非常認同,而且我越來越認同這件事情」"},{"page":22,"text":"「因為你要去理解那些在位階上的人怎麼做決策」"},{"page":22,"text":"「那些 stakeholder 怎麼做決策、他為什麼這樣做、他可能以後會怎麼做」"},{"page":22,"text":"「你要有一個核心的專業,也不見得要是你現在選的」"},{"page":22,"text":"「但是你終究得有一個核心的專業」"},{"page":22,"text":"「然後用你的專業去解決其他領域的問題」"},{"page":22,"text":"「這就是把你的價值最大化、把你的影響力最大化」"},{"page":23,"text":"「AI 感覺要把這個職位相關要會的東西都扼殺掉了」"},{"page":23,"text":"「很多是大學教授很知名的大學教授出來開的課」"},{"page":23,"text":"「上完還可以在履歷上有一個證書」"},{"page":23,"text":"「你花個五六百萬,其實沒啥意義」"},{"page":23,"text":"不如「兩三年不工作,拿那五六百萬的機會成本好好的把一些東西學起來」"},{"page":23,"text":"「還比你出國唸書有用」"},{"page":23,"text":"「進台積電這種明確需要碩士的目標 → 直接念,不用想」"},{"page":23,"text":"「因為有些東西是明確的,有些東西不是」"},{"page":23,"text":"「AI 讓很多領域的所謂原本專精的領域變得也沒有那麼專精了」"},{"page":24,"text":"「如果我需要我就是會去念」"},{"page":24,"text":"「人就是要跟著時代去走」"},{"page":24,"text":"「你要學一個理論變得更容易」"},{"page":24,"text":"「你去念到一個學歷,他的護城河也變弱了」"},{"page":24,"text":"「不是不去念書,而是要更謹慎」"},{"page":24,"text":"「因為我現在在 train AI 取代我」"},{"page":24,"text":"「但是我自己有開公司,現在在非洲」"},{"page":24,"text":"「也是運用我當年在會計系學的東西,那些我真正想用的東西」"},{"page":24,"text":"「你未來在某個時間點,可能會用很怪異的方式,把你曾經學到的東西全部連在一起」"},{"page":25,"text":"「技多不壓身」的具體價值"},{"page":25,"text":"3. 「某一個很 niche 的能力,在未來你用到」"},{"page":25,"text":"4. 或者「因為你用那個能力認識某些人,然後有某些機會讓你去驗證」"},{"page":25,"text":"「這個東西的本質:你有理念但是缺執行力的人會有優勢」"},{"page":25,"text":"「我明確知道我要幹嘛」"},{"page":25,"text":"「我只是要叫你( AI )去做」"},{"page":25,"text":"「我反而是會得利的人」"},{"page":25,"text":"「現在的學生出社會還沒有累積到資本」"},{"page":25,"text":"「但是 AI 的資源跟晉升機會可能都掌握在已經卡好位、有資本的人身上」"},{"page":25,"text":"「我對未來是比較悲觀的」"},{"page":25,"text":"「你會的東西夠多、你夠了解這個社會的本質」"},{"page":25,"text":"「你會是更好做出高品質決策的人」"},{"page":25,"text":"核心金句"},{"page":26,"text":"「每一件事情、每一個危機出來,你都要去瞭解它的本質」"},{"page":26,"text":"「然後去瞭解誰會活下來、誰不會活下來」"},{"page":26,"text":"「事情出來的時候,大家都在恐慌、都在情緒」"},{"page":26,"text":"「你不要去聽那些人講話,稍微聽一下就好」"},{"page":26,"text":"「你自己去分析到底事情的本質是什麼」"},{"page":26,"text":"「你學越多東西,你就越不會被騙」"},{"page":26,"text":"「你也不會被情緒帶著走」"},{"page":26,"text":"「你越可以去挖掘出事情的本質」"},{"page":26,"text":"「跨領域的優勢就是你會更好的去解讀這個世界上的所有事情」"},{"page":26,"text":"20 幾歲 「人脈不是那麼重要」"},{"page":26,"text":"30 幾歲 「個人單打獨鬥是不夠的」"},{"page":27,"text":"「沒有一定要逼自己參與系上活動」"},{"page":27,"text":"「但還是要有一些系上的知心朋友」"},{"page":27,"text":"「真的覺得這個人未來可以幫得上你的忙的朋友」"},{"page":27,"text":"「看一個人的有沒有料,就看他周遭最熟的 5 個人取個平均,大概就是他了」"},{"page":27,"text":"對供需理論「眼睛亮了一樣」"},{"page":27,"text":"「試著拿你學到的理論,在生活上給自己一個命題去驗證」"},{"page":28,"text":"整場第六個核心金句"},{"page":28,"text":"「面試官根本不想看你的分數」"},{"page":28,"text":"「能不能把分數化為理論,從理論化為實務」"},{"page":28,"text":"「這個才是他們想要看到的人才」"},{"page":28,"text":"4. 「你才有辦法把一個東西玩到很通」"},{"page":28,"text":"「分數高不高不是那麼重要」"},{"page":28,"text":"「出社會一點都不重要」"},{"page":28,"text":"「找到第一份工作的時候就不重要」"},{"page":29,"text":"「政大人跟台大人的臨門一腳,就是政大人太過保守了」"},{"page":29,"text":"「很多東西其實在大學的時候就可以走」"},{"page":29,"text":"「我感覺你以我認識的政大人來講,你算是超級清新」"},{"page":29,"text":"「你基本上你有這種心態,你在台大、政大都一樣」"},{"page":29,"text":"「今天如果重來,我一定也會給你這些意見」"},{"page":29,"text":"「你的邏輯是對的,你的價值觀是對的」"},{"page":29,"text":"「我覺得這是一個蠻值得你花時間的地方」"},{"page":29,"text":"「還有很多年,一定會有很多自我懷疑」"},{"page":30,"text":"「政大學生很努力,但跟台大學生比有一個問題 :"},{"page":30,"text":"校風保守,大家比較不敢做跳脫思維的事」"},{"page":30,"text":"「整個會計系還是被余老師那個價值觀」"},{"page":30,"text":"「還是很多人覺得『瘋狂把會計系念好,去做相關的工作做一做』」"},{"page":30,"text":"「再想要怎麼辦,那是其實有點來不及了」"},{"page":30,"text":"「你大一就在做這件事情(訪談跨領域者)」"},{"page":30,"text":"「我覺得超棒的、就蠻厲害的」"},{"page":30,"text":"「你已經看透蠻多事情的本質」"},{"page":30,"text":"「我一點也不擔心你的未來」"},{"page":30,"text":"「你一定會修正到你想去的地方」"},{"page":30,"text":"整場第七個核心金句"},{"page":30,"text":"「你的決心比你念什麼科系重要多了」"},{"page":30,"text":"「現在又不是什麼三四十年前」"},{"page":30,"text":"「你真的想做什麼東西,你的決心比你念什麼科系重要多了」"},{"page":31,"text":"「決心跟有沒有辦法去做這些東西都要去驗證」"},{"page":31,"text":"「社會的變化要一直去觀察」"},{"page":31,"text":"「整個社會可能都長不一樣」"},{"page":31,"text":"整場第八個核心金句"},{"page":31,"text":"「絕對不要去脈絡化去討論一件事情」"},{"page":31,"text":"「一定要知道每件事情怎麼來的」"},{"page":31,"text":"「但同齡來講,待遇是不錯,生活狀況也不錯,也比較自由」"},{"page":31,"text":"「我從來沒有把自己當成功人士」"},{"page":31,"text":"「我也不覺得我要變成成功人士」"},{"page":31,"text":"「我再來一次,我還是會做一樣的事情」"},{"page":31,"text":"「不管是薪水待遇、眼界、解決問題的能力」"},{"page":31,"text":"「我都比蠻大一半的大學同學好」"},{"page":32,"text":"「家族其實沒什麼人在做這件事情」"},{"page":32,"text":"「大家這個家族的人還是比較傳統」"},{"page":32,"text":"「如果能幫上忙,我都盡量幫」"},{"page":32,"text":"「還是不要有冤枉路,正常走了」"},{"page":32,"text":"1. 「把職涯想成投資 —— 你是用你的時間,去買進你的職涯這張股票。」"},{"page":32,"text":"2. 「我不是叫 AI 去想解決方法,我是想好解決方法叫 AI 去執行。」"},{"page":32,"text":"3. 「人累積過的東西永遠會在;如果你真的有累積到東西,永遠會在某個時刻發光,然後幫你一把。」"},{"page":32,"text":"4. 「最忌諱的事情是極端 —— 你完全相信 AI 跟你完全相信自己的基本功,都會有問題。」"},{"page":32,"text":"5. 「面試官根本不想看你的分數,是要看你能不能把分數化為理論、把理論化為實務。」"},{"page":32,"text":"6. 「你的決心比你念什麼科系重要多了。」"},{"page":32,"text":"7. 「絕對不要去脈絡化去討論一件事情,一定要知道每件事情怎麼來的。」"},{"page":32,"text":"8. 「看一個人有沒有料,就看他周遭最熟的 5 個人取個平均,大概就是他了。」"},{"page":32,"text":"9. 「你會的東西夠多、你夠了解這個社會的本質,至少不會落於人後。」"},{"page":32,"text":"10. 「就是要對自己誠實 —— 要更了解自己才能誠實。」"}]},{"id":"professor","navLabel":"教授訪談","label":"北科大法律通識老師","heroTitle":"教授這個職位：最熟悉的陌生人","intro":"這份訪談從學生對教授的敬畏與陌生感出發，走進陳建文老師的人生路徑、法律系求學、家庭責任、博士與任教歷程，也整理出他對教學、研究、通識教育、跨領域翻譯和大學學習的深層提醒。","stats":["教授訪談頁面","核心主題節點","可引用觀點","跨領域提醒"],"pages":[{"num":1,"title":"訪談紀錄 2: 北科大法律通識老師 (陳建文)","stars":1,"chapter":"一、教授與學生的陌生感","sections":[{"heading":"1 - 1 訪談者的提問 ⭐ ⭐ ⭐","stars":0,"blocks":[{"type":"subhead","text":"訪談紀錄 2: 北科大法律通識老師 (陳建文)"},{"type":"quote","text":"🎬 一 、 開場: 為什麼教授是 「 最熟悉的陌生人 」 ⭐ ⭐ ⭐ ⭐ ⭐"}]},{"heading":"1 - 2 老師自己當學生時的經驗 ⭐ ⭐ ⭐ ⭐","stars":0,"blocks":[{"type":"subhead","text":"訪談背景訪談者:政治大學財務管理系學生(大一)"},{"type":"key","text":"受訪者:陳建文老師(政大法律學士、政大勞工研究所、政大法律博士 → 北科大通識中心, 19 年資歷)"},{"type":"quote","text":"訪談主題:認識「 大學裡最熟悉的陌生人 」 —— 教授這個職位對應大綱: Hermes/ 訪談 2"},{"type":"subhead","text":"重要度評分系統星等含義"},{"type":"subhead","text":"⭐ ⭐ ⭐ ⭐ ⭐ 必讀、整章核心"},{"type":"subhead","text":"⭐ ⭐ ⭐ ⭐ 高度重要、考試常引用"},{"type":"subhead","text":"⭐ ⭐ ⭐ 重要、有用"},{"type":"subhead","text":"⭐ ⭐ 輔助、補充脈絡"}]},{"heading":"⭐ 背景資料為什麼覺得教授陌生?「陌生就陌生, 在他是給我們分數的,他掌握著生殺大權,所以我覺得他會特別敬畏又陌生」","stars":1,"blocks":[{"type":"subhead","text":"同樣感覺敬畏"}]}],"plain":"逐字稿對應範圍：00:00:06,673 → 00:02:59,961\n配對方式：依教授訪談 PDF 頁面順序與內容量初步對應，供人工審核與微調。\n\n[00:00:06] 教授你好,\n[00:00:11] 請問世新陳同學嗎?是\n[00:00:13] 的\n[00:00:15] 是的,你好,我\n[00:00:17] 陳建文好,我知道,那我跟你進行1個小小的訪談,他是跟我的職涯有關係,但是我覺得我特別想知道,就是當我當我知道老師的身分之後,我其實更想瞭解這個大學裡面,我們最熟悉的陌生人,我覺得就是教授,可以嗎?\n[00:00:46] 可以可以可以為什麼會覺得陌生\n[00:00:48] 呢?因為我覺得\n[00:00:51] 我覺得陌生就陌生,在,他是給我們分數的,他掌握著生殺大權,所以我覺得他會特別敬畏又陌生\n[00:0  」"},{"page":13,"text":"「 沒上,不是你不好 」"},{"page":13,"text":"「 就是人家有各種考慮 」"},{"page":13,"text":"「 沒有核到他們需要的,當然他們沒有選擇你,不是你不好 」"},{"page":13,"text":"「 但你沒有試,你就沒機會 」"},{"page":13,"text":"「 都願意幫我寫推薦函 」"},{"page":13,"text":"「 他們覺得跟我相處過、指導過我,應該幫我一把 」"},{"page":14,"text":"「 第二名被勾選 」"},{"page":14,"text":"「自己想也想不出來」"},{"page":14,"text":"「我自己沒有勇氣去的時候,旁邊的人就給你勇氣」"},{"page":14,"text":"「 美國加州律師資格 + 英文教學 + 學歷漂亮 」"},{"page":14,"text":"「 他們全部都嚇了一跳 」"},{"page":14,"text":"「 或許是我那時候覺得我自己不夠 」"},{"page":14,"text":"「 我自己在國內,我拿國內的學歷 」"},{"page":14,"text":"「 我自己唯一能夠做的就是努力 」"},{"page":14,"text":"「 所以文章寫得多,發表的多 」"},{"page":14,"text":"「 或許那個差異性 」"},{"page":14,"text":"「 能進去我是很珍惜 」"},{"page":14,"text":"「 這個真的不是很容易 」"},{"page":14,"text":"「 一路有很多人幫忙 」"},{"page":15,"text":"「不是 1 個選擇或是一路都是我自己做選擇」"},{"page":15,"text":"「 因為有時候好像沒得選,則我沒得選擇 」"},{"page":15,"text":"「更好」"},{"page":15,"text":"「 那個可能我也懂,但是我我我不愛 」"},{"page":15,"text":"「 叫更多我不愛的科目 」"},{"page":15,"text":"「他們有說那個差異」"},{"page":15,"text":"「他可能要教⺠法、行政法、憲法、刑訴, 之後才能夠開個選修的勞動法 」"},{"page":15,"text":"「 這樣看起來,你比較幸福 」"},{"page":15,"text":"「 法學院進來的人的學經歷真的都是國外百大的 」"},{"page":15,"text":"「 這個學歷都在,大家沒有公開,但是隱隱約約預約會有不利 」"},{"page":15,"text":"「 他覺得困難重重 」"},{"page":16,"text":"「 幸福 」"},{"page":16,"text":"「 名聲 」"},{"page":16,"text":"「 你到頂大、台大、政大這種學校當老師 」"},{"page":16,"text":"「 那壓力等級是高的 」"},{"page":16,"text":"「 看到在政大、台大的學?們,他們弄那個國際會議什麼都累死了 」"},{"page":16,"text":"「 1 天到晚跑 」"},{"page":16,"text":"「 我在北科沒有,我就純粹就是教學,然後做我愛的研究 」"},{"page":16,"text":"「人的幸福快樂是建立在什麼上面?」"},{"page":16,"text":"「是做給別人看你很痛苦,你很辛苦,別人說很好啊你是台大的老師啊」"},{"page":16,"text":"「還是你覺得我各方面的幸福感都很好?」"},{"page":16,"text":"「 同樣是國立大學,待遇一樣 」"},{"page":16,"text":"「 只是說那個評價上 」"},{"page":16,"text":"「 人家說喔你是北科的老師喔你是政大老師你是台大老師,就那個差異 」"},{"page":16,"text":"「 跟一些同儕或是學?姐的交流 」"},{"page":16,"text":"「 他們就會覺得你這個才叫幸福 」"},{"page":16,"text":"「 你可以教那麼多勞動法 」"},{"page":16,"text":"「 他們有時候一整學期沒辦法排勞動法的課 」"},{"page":17,"text":"「 現在不會有要走的打算 」"},{"page":17,"text":"「 也到了 50 幾歲,這樣就去頂大去評,我也受不了 」"},{"page":17,"text":"「 聽他那樣講,就是飛來飛去,然後接待外賓什麼的,忙得要死 」 "page":20,"text":"「我們怎麼樣不被 AI 取代?」"},{"page":20,"text":"「我不是叫 AI 去想解決方法,我是想好解決方法叫 AI 去執行」"},{"page":20,"text":"我做的「奇怪小東西」會不會其實是趨勢?"},{"page":20,"text":"「核心價值是讓一個獨特的領域有價值」"},{"page":20,"text":"「不要 all in ,像投資一樣」"},{"page":21,"text":"📖 十一、 商科生在 A I 時代的 「文科優勢」 ⭐ ⭐ ⭐ ⭐"},{"page":21,"text":"直到 niche 真的「在可預見的未來有機會走某一個成功模式」"},{"page":21,"text":"「你光靠你跨領域的背景,你在某件事情上可能就可以做到很立體,而且很厲害」"},{"page":21,"text":"用「研究財報」的方法研究每個客戶"},{"page":21,"text":"在公司內部成為「解釋模型的高手」"},{"page":21,"text":"「文科生會更瞭解(社會)」"},{"page":22,"text":"「這個社會運作的方式」包含:"},{"page":22,"text":"「你要入是你才有可能去讓你的產品有 impact」"},{"page":22,"text":"「才有可能去做出別人沒辦法做出來的解決方案」"},{"page":22,"text":"「我到現在還是非常認同,而且我越來越認同這件事情」"},{"page":22,"text":"「因為你要去理解那些在位階上的人怎麼做決策」"},{"page":22,"text":"「那些 stakeholder 怎麼做決策、他為什麼這樣做、他可能以後會怎麼做」"},{"page":22,"text":"「你要有一個核心的專業,也不見得要是你現在選的」"},{"page":22,"text":"「但是你終究得有一個核心的專業」"},{"page":22,"text":"「然後用你的專業去解決其他領域的問題」"},{"page":22,"text":"「這就是把你的價值最大化、把你的影響力最大化」"},{"page":23,"text":"「AI 感覺要把這個職位相關要會的東西都扼殺掉了」"},{"page":23,"text":"「很多是大學教授很知名的大學教授出來開的課」"},{"page":23,"text":"「上完還可以在履歷上有一個證書」"},{"page":23,"text":"「你花個五六百萬,其實沒啥意義」"},{"page":23,"text":"不如「兩三年不工作,拿那五六百萬的機會成本好好的把一些東西學起來」"},{"page":23,"text":"「還比你出國唸書有用」"},{"page":23,"text":"「進台積電這種明確需要碩士的目標 → 直接念,不用想」"},{"page":23,"text":"「因為有些東西是明確的,有些東西不是」"},{"page":23,"text":"「AI 讓很多領域的所謂原本專精的領域變得也沒有那麼專精了」"},{"page":24,"text":"「如果我需要我就是會去念」"},{"page":24,"text":"「人就是要跟著時代去走」"},{"page":24,"text":"「你要學一個理論變得更容易」"},{"page":24,"text":"「你去念到一個學歷,他的護城河也變弱了」"},{"page":24,"text":"「不是不去念書,而是要更謹慎」"},{"page":24,"text":"「因為我現在在 train AI 取代我」"},{"page":24,"text":"「但是我自己有開公司,現在在非洲」"},{"page":24,"text":"「也是運用我當年在會計系學的東西,那些我真正想用的東西」"},{"page":24,"text":"「你未來在某個時間點,可能會用很怪異的方式,把你曾經學到的東西全部連在一起」"},{"page":25,"text":"「技多不壓身」的具體價值"},{"page":25,"text":"3. 「某一個很 niche 的能力,在未來你用到」"},{"page":25,"text":"4. 或者「因為你用那個能力認識某些人,然後有某些機會讓你去驗證」"},{"page":25,"text":"「這個東西的本質:你有理念但是缺執行力的人會有優勢」"},{"page":25,"text":"「我明確知道我要幹嘛」"},{"page":25,"text":"「我只是要叫你( AI )去做」"},{"page":25,"text":"「我反而是會得利的人」"},{"page":25,"text":"「現在的學生出社會還沒有累積到資本」"},{"page":25,"text":"「但是 AI 的資源跟晉升機會可能都掌握在已經卡好位、有資本的人身上」"},{"page":25,"text":"「我對未來是比較悲觀的」"},{"page":25,"text":"「你會的東西夠多、你夠了解這個社會的本質」"},{"page":25,"text":"「你會是更好做出高品質決策的人」"},{"page":25,"text":"核心金句"},{"page":26,"text":"「每一件事情、每一個危機出來,你都要去瞭解它的本質」"},{"page":26,"text":"「然後去瞭解誰會活下來、誰不會活下來」"},{"page":26,"text":"「事情出來的時候,大家都在恐慌、都在情緒」"},{"page":26,"text":"「你不要去聽那些人講話,稍微聽一下就好」"},{"page":26,"text":"「你自己去分析到底事情的本質是什麼」"},{"page":26,"text":"「你學越多東西,你就越不會被騙」"},{"page":26,"text":"「你也不會被情緒帶著走」"},{"page":26,"text":"「你越可以去挖掘出事情的本質」"},{"page":26,"text":"「跨領域的優勢就是你會更好的去解讀這個世界上的所有事情」"},{"page":26,"text":"20 幾歲 「人脈不是那麼重要」"},{"page":26,"text":"30 幾歲 「個人單打獨鬥是不夠的」"},{"page":27,"text":"「沒有一定要逼自己參與系上活動」"},{"page":27,"text":"「但還是要有一些系上的知心朋友」"},{"page":27,"text":"「真的覺得這個人未來可以幫得上你的忙的朋友」"},{"page":27,"text":"「看一個人的有沒有料,就看他周遭最熟的 5 個人取個平均,大概就是他了」"},{"page":27,"text":"對供需理論「眼睛亮了一樣」"},{"page":27,"text":"「試著拿你學到的理論,在生活上給自己一個命題去驗證」"},{"page":28,"text":"整場第六個核心金句"},{"page":28,"text":"「面試官根本不想看你的分數」"},{"page":28,"text":"「能不能把分數化為理論,從理論化為實務」"},{"page":28,"text":"「這個才是他們想要看到的人才」"},{"page":28,"text":"4. 「你才有辦法把一個東西玩到很通」"},{"page":28,"text":"「分數高不高不是那麼重要」"},{"page":28,"text":"「出社會一點都不重要」"},{"page":28,"text":"「找到第一份工作的時候就不重要」"},{"page":29,"text":"「政大人跟台大人的臨門一腳,就是政大人太過保守了」"},{"page":29,"text":"「很多東西其實在大學的時候就可以走」"},{"page":29,"text":"「我感覺你以我認識的政大人來講,你算是超級清新」"},{"page":29,"text":"「你基本上你有這種心態,你在台大、政大都一樣」"},{"page":29,"text":"「今天如果重來,我一定也會給你這些意見」"},{"page":29,"text":"「你的邏輯是對的,你的價值觀是對的」"},{"page":29,"text":"「我覺得這是一個蠻值得你花時間的地方」"},{"page":29,"text":"「還有很多年,一定會有很多自我懷疑」"},{"page":30,"text":"「政大學生很努力,但跟台大學生比有一個問題 :"},{"page":30,"text":"校風保守,大家比較不敢做跳脫思維的事」"},{"page":30,"text":"「整個會計系還是被余老師那個價值觀」"},{"page":30,"text":"「還是很多人覺得『瘋狂把會計系念好,去做相關的工作做一做』」"},{"page":30,"text":"「再想要怎麼辦,那是其實有點來不及了」"},{"page":30,"text":"「你大一就在做這件事情(訪談跨領域者)」"},{"page":30,"text":"「我覺得超棒的、就蠻厲害的」"},{"page":30,"text":"「你已經看透蠻多事情的本質」"},{"page":30,"text":"「我一點也不擔心你的未來」"},{"page":30,"text":"「你一定會修正到你想去的地方」"},{"page":30,"text":"整場第七個核心金句"},{"page":30,"text":"「你的決心比你念什麼科系重要多了」"},{"page":30,"text":"「現在又不是什麼三四十年前」"},{"page":30,"text":"「你真的想做什麼東西,你的決心比你念什麼科系重要多了」"},{"page":31,"text":"「決心跟有沒有辦法去做這些東西都要去驗證」"},{"page":31,"text":"「社會的變化要一直去觀察」"},{"page":31,"text":"「整個社會可能都長不一樣」"},{"page":31,"text":"整場第八個核心金句"},{"page":31,"text":"「絕對不要去脈絡化去討論一件事情」"},{"page":31,"text":"「一定要知道每件事情怎麼來的」"},{"page":31,"text":"「但同齡來講,待遇是不錯,生活狀況也不錯,也比較自由」"},{"page":31,"text":"「我從來沒有把自己當成功人士」"},{"page":31,"text":"「我也不覺得我要變成成功人士」"},{"page":31,"text":"「我再來一次,我還是會做一樣的事情」"},{"page":31,"text":"「不管是薪水待遇、眼界、解決問題的能力」"},{"page":31,"text":"「我都比蠻大一半的大學同學好」"},{"page":32,"text":"「家族其實沒什麼人在做這件事情」"},{"page":32,"text":"「大家這個家族的人還是比較傳統」"},{"page":32,"text":"「如果能幫上忙,我都盡量幫」"},{"page":32,"text":"「還是不要有冤枉路,正常走了」"},{"page":32,"text":"1. 「把職涯想成投資 —— 你是用你的時間,去買進你的職涯這張股票。」"},{"page":32,"text":"2. 「我不是叫 AI 去想解決方法,我是想好解決方法叫 AI 去執行。」"},{"page":32,"text":"3. 「人累積過的東西永遠會在;如果你真的有累積到東西,永遠會在某個時刻發光,然後幫你一把。」"},{"page":32,"text":"4. 「最忌諱的事情是極端 —— 你完全相信 AI 跟你完全相信自己的基本功,都會有問題。」"},{"page":32,"text":"5. 「面試官根本不想看你的分數,是要看你能不能把分數化為理論、把理論化為實務。」"},{"page":32,"text":"6. 「你的決心比你念什麼科系重要多了。」"},{"page":32,"text":"7. 「絕對不要去脈絡化去討論一件事情,一定要知道每件事情怎麼來的。」"},{"page":32,"text":"8. 「看一個人有沒有料,就看他周遭最熟的 5 個人取個平均,大概就是他了。」"},{"page":32,"text":"9. 「你會的東西夠多、你夠了解這個社會的本質,至少不會落於人後。」"},{"page":32,"text":"10. 「就是要對自己誠實 —— 要更了解自己才能誠實。」"}]}</script><script>
const data=JSON.parse(document.getElementById('data').textContent);if(!data.interviews)data.interviews=[{id:'cousin',navLabel:'\u8868\u54e5\u8a2a\u8ac7',label:'\u653f\u5927\u6703\u8a08\u5230 AI \u5206\u6790\u5e2b',heroTitle:'\u4e00\u5834\u95dc\u65bc\u8f49\u8077\u3001AI \u8207\u81ea\u6211\u8aa0\u5be6\u7684\u6df1\u5ea6\u8a2a\u8ac7',intro:'',stats:['\u5b8c\u6574\u8a2a\u8ac7\u8108\u7d61','\u6838\u5fc3\u4e3b\u984c\u7bc0\u9ede','\u53ef\u5f15\u7528\u89c0\u9ede','\u9010\u5c64\u8ffd\u554f'],pages:data.pages,quotes:data.quotes}];const STAR='\u2b50';let activeInterview=data.interviews[0].id,current=1,starFilter=0,expanded=false,quoteFilter='all',sideMode='nav';const currentByInterview=Object.fromEntries(data.interviews.map(x=>[x.id,1]));const openChapters=new Set();const nav=document.getElementById('nav'),content=document.getElementById('content'),quotes=document.getElementById('quotes'),quoteFilters=document.getElementById('quoteFilters'),navTools=document.getElementById('navTools'),quoteTools=document.getElementById('quoteTools'),modeNav=document.getElementById('modeNav'),modeQuotes=document.getElementById('modeQuotes'),search=document.getElementById('search'),interviewSwitch=document.getElementById('interviewSwitch'),heroLabel=document.getElementById('heroLabel'),heroTitle=document.getElementById('heroTitle'),heroIntro=document.getElementById('heroIntro');const esc=s=>String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));const cleanNavTitle=s=>String(s).replace(new RegExp('(?:\\s*'+STAR+')+\\s*$'),'').trim();const activeData=()=>data.interviews.find(x=>x.id===activeInterview)||data.interviews[0];const pages=()=>activeData().pages||[];const quoteList=()=>activeData().quotes||[];const maxStars=p=>Math.max(p.stars||0,...(p.sections||[]).map(s=>s.stars||0));const hasAny=(t,arr)=>arr.some(k=>t.includes(k));function pass(p){const q=search.value.trim().toLowerCase();if(starFilter&&maxStars(p)<starFilter)return false;if(!q)return true;return [p.title,p.chapter,p.plain].join('\n').toLowerCase().includes(q)}function groupedPages(){let groups=[],byKey=new Map();pages().forEach(p=>{const title=p.chapter||'\u672a\u5206\u985e\u7ae0\u7bc0';if(!byKey.has(title)){const g={title,pages:[]};byKey.set(title,g);groups.push(g)}byKey.get(title).pages.push(p)});return groups}function pageButton(p){const b=document.createElement('button');b.className='navPage'+(p.num===current?' active':'');b.innerHTML=`<div class="navNum">${String(p.num).padStart(2,'0')}</div><div class="navTitle">${esc(cleanNavTitle(p.title))}</div><div class="navStars" aria-label="stars">${STAR.repeat(Math.min(5,Math.max(1,maxStars(p))))}</div>`;b.onclick=()=>{current=p.num;currentByInterview[activeInterview]=current;render()};return b}function renderInterviewSwitch(){interviewSwitch.innerHTML='';data.interviews.forEach(iv=>{const b=document.createElement('button');b.className='interviewBtn'+(iv.id===activeInterview?' on':'');b.textContent=iv.navLabel;b.onclick=()=>{if(activeInterview===iv.id)return;currentByInterview[activeInterview]=current;activeInterview=iv.id;current=currentByInterview[activeInterview]||1;openChapters.clear();quoteFilter='all';renderQuoteFilters();render()};interviewSwitch.appendChild(b)})}function renderHero(){const d=activeData();heroLabel.textContent=d.label||d.navLabel;heroTitle.textContent=d.heroTitle||d.navLabel;heroIntro.textContent=d.intro||'';document.getElementById('pageCount').textContent=pages().length;document.getElementById('sectionCount').textContent=pages().reduce((a,p)=>a+(p.sections||[]).length,0);document.getElementById('quoteCount').textContent=quoteList().length;const labels=d.stats||['\u5b8c\u6574\u8a2a\u8ac7\u8108\u7d61','\u6838\u5fc3\u4e3b\u984c\u7bc0\u9ede','\u53ef\u5f15\u7528\u89c0\u9ede','\u9010\u5c64\u8ffd\u554f'];['statPages','statSections','statQuotes','statExtra'].forEach((id,i)=>{const el=document.getElementById(id);if(el)el.textContent=labels[i]||el.textContent})}function renderNav(){nav.innerHTML='';let any=false;const q=search.value.trim();groupedPages().forEach((g,idx)=>{const visible=g.pages.filter(pass);if(!visible.length)return;any=true;const id=`${activeInterview}-${idx}-${g.title}`;const active=visible.some(p=>p.num===current);const open=q||active||openChapters.has(id);const wrap=document.createElement('div');wrap.className='chapterGroup'+(open?'':' closed');const btn=document.createElement('button');btn.className='chapterBtn';btn.innerHTML=`<span>${esc(g.title)}<small>${String(visible[0].num).padStart(2,'0')} - ${String(visible[visible.length-1].num).padStart(2,'0')} / ${visible.length} \u9801</small></span><span>${open?'\u2212':'+'}</span>`;btn.onclick=()=>{if(openChapters.has(id))openChapters.delete(id);else openChapters.add(id);renderNav()};const list=document.createElement('div');list.className='chapterPages';visible.forEach(p=>list.appendChild(pageButton(p)));wrap.appendChild(btn);wrap.appendChild(list);nav.appendChild(wrap)});if(!any)nav.innerHTML='<div class="empty">\u6c92\u6709\u7b26\u5408\u689d\u4ef6\u7684\u9801\u9762</div>'}function blockHtml(b){if(b.type==='quote')return `<blockquote class="quoteBlock">${String(b.text).split('\n').map(x=>`<p>${esc(x)}</p>`).join('')}</blockquote>`;if(b.type==='list')return `<ul class="noteList">${(b.items||[]).map(x=>`<li>${esc(x)}</li>`).join('')}</ul>`;if(b.type==='callout')return `<div class="callout">${esc(b.text)}</div>`;if(b.type==='key')return `<div class="key">${esc(b.text)}</div>`;if(b.type==='subhead')return `<div class="note-subhead">${esc(b.text)}</div>`;return `<p class="para">${esc(b.text)}</p>`}function renderContent(){const list=pages();const p=list.find(x=>x.num===current)||list.find(pass)||list[0];if(!p)return;current=p.num;currentByInterview[activeInterview]=current;const secs=(p.sections||[]).map((s,i)=>`<article class="section ${expanded||i===0?'open':''}"><button class="sectionBtn"><span>${esc(s.heading)}</span><span>${s.stars?STAR.repeat(Math.min(5,s.stars)):''} ?</span></button><div class="sectionBody">${(s.blocks||[]).map(blockHtml).join('')}</div></article>`).join('');content.innerHTML=`<section class="panel pageHead"><div class="pageNo">${String(p.num).padStart(2,'0')}</div><div><div class="label">${esc(activeData().navLabel)} / PDF \u7b2c ${p.num} \u9801</div><h2>${esc(p.title)}</h2><p>\u9019\u4e00\u9801\u4fdd\u7559\u6574\u7406\u5f8c\u7684\u91cd\u9ede\u7b46\u8a18\uff0c\u4e0b\u65b9\u539f\u6587\u5340\u6539\u7528\u9010\u5b57\u7a3f\u521d\u6b65\u914d\u5c0d\u6bb5\u843d\uff0c\u65b9\u4fbf\u9010\u9801\u5be9\u6838\u3002</p></div></section><section class="panel"><div class="label">\u7b46\u8a18\u5f0f\u95b1\u8b80</div>${secs}<details><summary class="sectionBtn" style="border:3px solid var(--ink);background:var(--cyan);margin-top:18px;">\u67e5\u770b\u5c0d\u61c9\u9010\u5b57\u7a3f\u539f\u6587</summary><div class="sectionBody" style="display:block"><div class="raw">${esc(p.plain)}</div></div></details></section>`;content.querySelectorAll('.sectionBtn').forEach(btn=>btn.onclick=()=>btn.parentElement.classList.toggle('open'))}const quoteTypes=[['all','\u5168\u90e8'],['career','\u8077\u6daf'],['ai','AI'],['accounting','\u6703\u8a08/\u4e8b\u52d9\u6240'],['learning','\u5b78\u7fd2\u65b9\u6cd5'],['self','\u81ea\u6211\u7406\u89e3'],['people','\u4eba\u8108/\u793e\u6703']];function quoteType(t){t=String(t);if(t.includes('AI')||t.includes('ChatGPT')||hasAny(t,['\u8cc7\u6599','\u6a21\u578b','\u6280\u8853','\u5de5\u5177','\u7522\u54c1','\u5de5\u7a0b']))return'ai';if(hasAny(t,['\u6703\u8a08','\u4e8b\u52d9\u6240','\u5be9\u8a08','\u8ca1\u52d9','\u8001\u5e2b','\u6559\u6388','\u901a\u8b58','\u6cd5\u5f8b','\u884c\u653f','\u671f\u520a','\u5347\u7b49']))return'accounting';if(hasAny(t,['\u8077\u6daf','\u5de5\u4f5c','\u516c\u53f8','\u85aa\u6c34','\u8f49\u8077','\u5c65\u6b77','\u9762\u8a66','\u5be6\u7fd2','\u79d1\u7cfb','\u78a9\u58eb','\u535a\u58eb','\u7522\u696d','\u516c\u52d9\u54e1']))return'career';if(hasAny(t,['\u5b78','\u5206\u6578','\u7406\u8ad6','\u7d71\u8a08','\u7d93\u6fdf','\u8ab2','Notebook','\u65b9\u6cd5','\u9a57\u8b49','\u57fa\u672c\u529f','\u81ea\u5b78','\u4fee\u8ab2']))return'learning';if(hasAny(t,['\u81ea\u5df1','\u8aa0\u5be6','\u559c\u6b61','\u8a0e\u53ad','\u6c7a\u5fc3','\u5fc3\u60c5','\u8ff7\u60d8','\u5b64\u7368','\u81ea\u6211','\u5e78\u798f']))return'self';if(hasAny(t,['\u4eba\u8108','\u670b\u53cb','\u793e\u6703','\u4e16\u754c','\u6c7a\u7b56','\u5bb6\u65cf','stakeholder','\u60c5\u7dd2','\u653f\u5927','\u53f0\u5927','\u5b78\u751f','\u540c\u5b78']))return'people';return'career'}function quoteLabel(k){return (quoteTypes.find(x=>x[0]===k)||quoteTypes[0])[1]}function renderQuoteFilters(){quoteFilters.innerHTML='';quoteTypes.forEach(([key,label])=>{const b=document.createElement('button');b.className='quoteChip'+(quoteFilter===key?' on':'');const count=key==='all'?quoteList().length:quoteList().filter(x=>quoteType(x.text)===key).length;b.textContent=`${label} ${count}`;b.onclick=()=>{quoteFilter=key;renderQuoteFilters();renderQuotes()};quoteFilters.appendChild(b)})}function renderQuotes(){const q=search.value.trim().toLowerCase();quotes.innerHTML='';quoteList().filter(x=>(quoteFilter==='all'||quoteType(x.text)===quoteFilter)&&(!q||x.text.toLowerCase().includes(q))).slice(0,160).forEach(x=>{const type=quoteType(x.text);const d=document.createElement('div');d.className='quote';d.innerHTML=`<small>PAGE ${String(x.page).padStart(2,'0')}</small><p>${esc(x.text)}</p><span class="quoteTag">${esc(quoteLabel(type))}</span>`;d.onclick=()=>{current=x.page;currentByInterview[activeInterview]=current;render()};quotes.appendChild(d)});if(!quotes.children.length)quotes.innerHTML='<div class="empty">\u6c92\u6709\u7b26\u5408\u9019\u500b\u5206\u985e\u6216\u641c\u5c0b\u7684\u91d1\u53e5</div>'}function renderMode(){navTools.classList.toggle('hidden',sideMode!=='nav');quoteTools.classList.toggle('hidden',sideMode!=='quotes');modeNav.classList.toggle('on',sideMode==='nav');modeQuotes.classList.toggle('on',sideMode==='quotes')}function render(){renderInterviewSwitch();renderHero();renderMode();renderNav();renderContent();renderQuotes()}document.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));c.classList.add('on');starFilter=Number(c.dataset.star);render()});search.oninput=render;document.getElementById('expandAll').onclick=()=>{expanded=!expanded;document.getElementById('expandAll').textContent=expanded?'\u5168\u90e8\u6536\u5408':'\u5168\u90e8\u5c55\u958b';renderContent()};modeNav.onclick=()=>{sideMode='nav';renderMode()};modeQuotes.onclick=()=>{sideMode='quotes';renderMode()};renderQuoteFilters();render();
</script></body></html>
